<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M&L Wellness Planner v13</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #f4f7f6; --text: #2c3e50; 
            --workout: #9c27b0; --massimo: #2196f3; --liliana: #e91e63;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .header { text-align: center; background: var(--primary); color: white; padding: 15px; position: sticky; top:0; z-index:100; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; }
        .btn-nav { background: #eee; border: none; padding: 10px 18px; border-radius: 12px; font-weight: bold; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; padding: 15px; }
        .day-dot { background: white; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .day-dot.today { border: 2px solid var(--primary); background: #e0f2f1; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 600px; height: 94vh; border-radius: 30px 30px 0 0; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        
        .section-box { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .time-header { font-size: 0.8rem; font-weight: 800; color: #78909c; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* Stile Tabelle Utenti */
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .user-col { border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .col-m { background: #e3f2fd; border: 1px solid #bbdefb; }
        .col-l { background: #fce4ec; border: 1px solid #f8bbd0; }

        /* Pulsanti e Input */
        .btn-action { width: 100%; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-m { background: var(--massimo); color: white; }
        .btn-l { background: var(--liliana); color: white; }
        .input-run { width: 100%; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 8px; box-sizing: border-box; font-weight: bold; text-align: center; }
        
        /* Checkbox grandi per facilità d'uso */
        .check-container { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9rem; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--primary); }

        /* Visualizzatore Scheda */
        #viewer { position: fixed; inset: 0; background: black; z-index: 2000; display: none; flex-direction: column; }
        #viewer img { width: 100%; height: 90%; object-fit: contain; }
        .close-viewer { color: white; padding: 20px; text-align: right; font-size: 1.5rem; font-weight: bold; }

        .gym-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 10px; font-family: inherit; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">M&L Wellness v13</h2>
    <div id="sync-status" style="font-size: 0.6rem;">● SINCRO ATTIVA</div>
</div>

<div class="nav-bar">
    <button class="btn-nav" onclick="cambiaSett(-7)">◀</button>
    <div id="week-label">...</div>
    <button class="btn-nav" onclick="cambiaSett(7)">▶</button>
</div>

<div class="calendar-grid" id="grid"></div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <span style="float:right; font-size:2rem; color:#ccc;" onclick="chiudi()">×</span>
        <h2 id="modal-title" style="color:var(--primary); margin-top:0;"></h2>

        <div class="time-header">📅 CORSI DEL GIORNO</div>
        <div class="section-box" id="corsi-list"></div>

        <div class="time-header">🏋️ SALA PESI</div>
        <div class="section-box">
            <div class="user-grid">
                <div class="user-col col-m">
                    <div class="check-container"><input type="checkbox" id="p-m" onchange="salvaCheck(this)"> MASSIMO</div>
                    <button class="btn-action btn-m" onclick="apriScheda('m')">📋 VEDI SCHEDA</button>
                </div>
                <div class="user-col col-l">
                    <div class="check-container"><input type="checkbox" id="p-l" onchange="salvaCheck(this)"> LILIANA</div>
                    <button class="btn-action btn-l" onclick="apriScheda('l')">📋 VEDI SCHEDA</button>
                </div>
            </div>
        </div>

        <div class="time-header">🏃 CORSA / CARDIO</div>
        <div class="section-box">
            <div class="user-grid">
                <div class="user-col col-m">
                    <span style="font-size:0.7rem; font-weight:bold;">MASSIMO</span>
                    <input type="text" id="r-m" class="input-run" placeholder="Km / Min" oninput="salvaDato(this)">
                </div>
                <div class="user-col col-l">
                    <span style="font-size:0.7rem; font-weight:bold;">LILIANA</span>
                    <input type="text" id="r-l" class="input-run" placeholder="Km / Min" oninput="salvaDato(this)">
                </div>
            </div>
        </div>

        <div class="time-header">🍱 ALIMENTAZIONE</div>
        <div class="section-box">
            <div class="user-label m-text">PRANZO</div>
            <textarea id="pra-m" rows="2" placeholder="Massimo..." oninput="salvaDato(this)"></textarea>
            <div class="user-label l-text" style="margin-top:10px;">CENA</div>
            <textarea id="cen-m" rows="2" placeholder="Cosa mangiamo stasera?" oninput="salvaDato(this)"></textarea>
        </div>
        
        <div style="height:40px"></div>
    </div>
</div>

<div id="viewer">
    <div class="close-viewer" onclick="document.getElementById('viewer').style.display='none'">CHIUDI [X]</div>
    <img id="scheda-img" src="" alt="Caricamento...">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Link alle immagini caricate (qui usiamo quelle che hai fornito)
    const schede = {
        m: "https://raw.githubusercontent.com/massimograglia/miomenu/main/Schedamassimo.jpg", // Sostituisci con link definitivo
        l: "" // Link scheda Liliana
    };

    const palinsesto = {
        "Lunedì": [{t:"09:00", c:"Tone Up"}, {t:"10:15", c:"Acqua Fit"}, {t:"12:00", c:"Power Func."}],
        "Martedì": [{t:"09:00", c:"Gym Dance"}, {t:"10:00", c:"Tone Up"}],
        "Mercoledì": [{t:"09:00", c:"Posturale"}, {t:"10:00", c:"Tonificazione"}],
        "Giovedì": [{t:"09:00", c:"Tone Up"}, {t:"10:00", c:"Pilates"}],
        "Venerdì": [{t:"09:00", c:"G.A.G"}, {t:"10:00", c:"Circuit"}],
        "Sabato": [{t:"09:00", c:"Yoga"}, {t:"10:00", c:"Tone Up"}],
        "Domenica": [{t:"10:00", c:"Sala Pesi Libera"}]
    };

    let dataInizio = new Date();
    dataInizio.setDate(dataInizio.getDate() - (dataInizio.getDay() === 0 ? 6 : dataInizio.getDay() - 1));
    let currentKey = "";

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let dot = document.createElement('div');
            dot.className = `day-dot ${d.toDateString()==new Date().toDateString()?'today':''}`;
            dot.onclick = () => apriDettaglio(new Date(d));
            dot.innerHTML = `<span style="font-size:0.7rem;">${d.toLocaleDateString('it-IT',{weekday:'short'})}</span><span style="font-size:1.5rem; font-weight:900;">${d.getDate()}</span>`;
            grid.appendChild(dot);
        }
        document.getElementById('week-label').innerText = dataInizio.toLocaleDateString('it-IT',{day:'numeric',month:'short'}) + " - " + new Date(new Date(dataInizio).setDate(dataInizio.getDate()+6)).toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    }

    function apriDettaglio(data) {
        currentKey = `${data.getFullYear()}-${data.getMonth()+1}-${data.getDate()}`;
        let giorno = data.toLocaleDateString('it-IT', {weekday:'long'});
        document.getElementById('modal-title').innerText = giorno.charAt(0).toUpperCase() + giorno.slice(1) + " " + data.getDate();
        document.getElementById('modal').style.display = 'flex';

        // Carica Corsi
        const corsi = palinsesto[giorno.charAt(0).toUpperCase() + giorno.slice(1)] || [];
        document.getElementById('corsi-list').innerHTML = corsi.map(c => `<div class="gym-row"><span>${c.t}</span><b>${c.c}</b></div>`).join("") || "Nessun corso oggi";

        // Carica Dati Firebase
        db.ref("dailyData/" + currentKey).once('value', snapshot => {
            const v = snapshot.val() || {};
            document.getElementById('p-m').checked = v['p-m'] || false;
            document.getElementById('p-l').checked = v['p-l'] || false;
            document.getElementById('r-m').value = v['r-m'] || "";
            document.getElementById('r-l').value = v['r-l'] || "";
            document.getElementById('pra-m').value = v['pra-m'] || "";
            document.getElementById('cen-m').value = v['cen-m'] || "";
        });
    }

    function apriScheda(user) {
        if (!schede[user]) { alert("Scheda non ancora caricata!"); return; }
        document.getElementById('scheda-img').src = schede[user];
        document.getElementById('viewer').style.display = 'flex';
    }

    function salvaDato(el) { db.ref("dailyData/" + currentKey + "/" + el.id).set(el.value); status(); }
    function salvaCheck(el) { db.ref("dailyData/" + currentKey + "/" + el.id).set(el.checked); status(); }
    
    function status() {
        document.getElementById('sync-status').innerText = "☁️ SALVATAGGIO...";
        setTimeout(() => document.getElementById('sync-status').innerText = "✅ SINCRO ATTIVA", 600);
    }

    function chiudi() { document.getElementById('modal').style.display = 'none'; }
    function cambiaSett(n) { dataInizio.setDate(dataInizio.getDate()+n); renderCalendar(); }
    window.onload = renderCalendar;
</script>
</body>
</html>
