<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massy & Lilly Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #26a69a; --bg: #f4f7f6; --massimo: #2196f3; --liliana: #e91e63; --relax: #9c27b0; --food: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #2c3e50; }
        .header { text-align: center; background: var(--primary); color: white; padding: 12px; position: sticky; top:0; z-index:100; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; border-bottom: 1px solid #eee; }
        .btn-nav { background: #eee; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 12px; }
        .day-dot { background: white; border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; }
        .day-dot.selected { background: var(--primary); color: white; }
        .day-dot.today { border: 2px solid var(--primary); }
        
        .agenda-section { padding: 15px; margin: 0 12px 20px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .agenda-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-add-group { display: flex; gap: 5px; }
        .btn-add { color: white; border: none; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        
        .appuntamento-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .m-text { color: var(--massimo); font-weight: bold; margin-right: 5px; }
        .l-text { color: var(--liliana); font-weight: bold; margin-right: 5px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: white; height: 90vh; border-radius: 25px 25px 0 0; overflow-y: auto; padding: 20px; }
        .tab-bar { display: flex; background: #f0f0f0; border-radius: 15px; padding: 5px; margin-bottom: 20px; gap:5px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; background: transparent; color: #888; font-size: 0.7rem; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 5px solid #ccc; position: relative; }
        .input-vocal-group { display: flex; gap: 5px; margin-bottom: 10px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; }
        .btn-mic { background: #f0f0f0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; }
        
        .food-img-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        .btn-view { border: none; padding: 12px; border-radius: 12px; color: white; width: 100%; font-weight: bold; margin-top: 8px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        #img-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 2000; align-items: center; justify-content: center; }
        #img-viewer img { max-width: 95%; max-height: 85%; border: 3px solid white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2>🏋️ Massy & Lilly</h2>
    <div id="sync-status" style="font-size: 0.6rem;">✅ DATABASE ATTIVO</div>
</div>

<div class="nav-bar">
    <button class="btn-nav" onclick="cambiaSett(-7)">◀</button>
    <div id="week-label" style="font-weight:bold;">...</div>
    <button class="btn-nav" onclick="cambiaSett(7)">▶</button>
</div>

<div class="calendar-grid" id="grid"></div>

<div class="agenda-section">
    <div class="agenda-header">
        <h3 id="agenda-date-label" style="margin:0; font-size:0.9rem; color:var(--primary);">Agenda</h3>
        <div class="btn-add-group">
            <button class="btn-add" style="background:var(--massimo)" onclick="aggiungiApt('m')">+ MASSY</button>
            <button class="btn-add" style="background:var(--liliana)" onclick="aggiungiApt('l')">+ LILLY</button>
        </div>
    </div>
    <div id="lista-appuntamenti"></div>
</div>

<div style="padding: 0 15px;">
    <button class="btn-view" style="background:#455a64;" onclick="apriDettaglio(curDate)">⚙️ GESTISCI GIORNATA</button>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="modal-title" style="color:var(--primary); margin:0;"></h2>
            <span style="font-size:2.5rem; color:#ccc; cursor:pointer;" onclick="chiudi()">×</span>
        </div>
        
        <div class="tab-bar">
            <button class="tab-btn active" onclick="openTab(event, 'tab-gym')">🏋️ GYM</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-food')">🍎 MENÙ</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-relax')">🧘 RELAX</button>
        </div>
        
        <div id="tab-gym" class="tab-content active">
            <div class="card" style="border-left-color:var(--massimo)">
                <button class="btn-view" style="background:var(--massimo)" onclick="apriScheda('m')">📋 SCHEDA MASSY</button>
            </div>
            <div class="card" style="border-left-color:var(--liliana)">
                <button class="btn-view" style="background:var(--liliana)" onclick="apriScheda('l')">📋 SCHEDA LILLY</button>
            </div>
            <div id="gym-list-m"></div>
            <div id="gym-list-l"></div>
        </div>

        <div id="tab-food" class="tab-content">
            <div class="card" style="border-left-color:var(--massimo)">
                <div style="font-weight:bold; color:var(--massimo); margin-bottom:10px;">🍽️ MENÙ MASSIMO</div>
                <div class="input-vocal-group">
                    <textarea id="food-m" placeholder="Cosa ha mangiato Massimo?" oninput="salvaDato('food-m', this.value)"></textarea>
                    <button class="btn-mic" onclick="avviaVocale('food-m')">🎤</button>
                </div>
                <input type="file" id="file-m" accept="image/*" style="display:none" onchange="uploadFoto(this, 'img-m')">
                <button class="btn-view" style="background:#ccc; color:333;" onclick="document.getElementById('file-m').click()">📸 AGGIUNGI FOTO</button>
                <img id="img-m" class="food-img-preview" onclick="ingrandisci(this.src)">
            </div>

            <div class="card" style="border-left-color:var(--liliana)">
                <div style="font-weight:bold; color:var(--liliana); margin-bottom:10px;">🍽️ MENÙ LILLIANA</div>
                <div class="input-vocal-group">
                    <textarea id="food-l" placeholder="Cosa ha mangiato Lilly?" oninput="salvaDato('food-l', this.value)"></textarea>
                    <button class="btn-mic" onclick="avviaVocale('food-l')">🎤</button>
                </div>
                <input type="file" id="file-l" accept="image/*" style="display:none" onchange="uploadFoto(this, 'img-l')">
                <button class="btn-view" style="background:#ccc; color:333;" onclick="document.getElementById('file-l').click()">📸 AGGIUNGI FOTO</button>
                <img id="img-l" class="food-img-preview" onclick="ingrandisci(this.src)">
            </div>
        </div>

        <div id="tab-relax" class="tab-content">
            <button class="btn-view" style="background:var(--massimo)" onclick="window.open('spotify:','_blank')">🎧 SPOTIFY MASSY</button>
            <button class="btn-view" style="background:var(--liliana); margin-top:10px;" onclick="window.open('spotify:','_blank')">🎧 SPOTIFY LILLY</button>
        </div>
    </div>
</div>

<div id="img-viewer" onclick="this.style.display='none'"><img id="view-src"></div>

<script>
    // Configurazione Firebase (mantenuta la tua)
    const firebaseConfig = { apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc", authDomain: "miomenu-e2e51.firebaseapp.com", databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", projectId: "miomenu-e2e51" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataInizio = new Date();
    dataInizio.setDate(dataInizio.getDate() - (dataInizio.getDay() === 0 ? 6 : dataInizio.getDay() - 1));
    let curKey = "";
    let curDate = new Date();

    // Logica Calendario
    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let dot = document.createElement('div');
            const isToday = d.toDateString() == new Date().toDateString();
            const isSelected = d.toDateString() == curDate.toDateString();
            dot.className = `day-dot ${isToday?'today':''} ${isSelected?'selected':''}`;
            dot.onclick = () => selezionaGiorno(new Date(d));
            dot.innerHTML = `<div style="font-size:0.6rem;">${d.toLocaleDateString('it-IT',{weekday:'short'}).toUpperCase()}</div><b style="font-size:1.2rem;">${d.getDate()}</b>`;
            grid.appendChild(dot);
        }
        document.getElementById('week-label').innerText = dataInizio.toLocaleDateString('it-IT',{day:'numeric',month:'short'}) + " - " + new Date(new Date(dataInizio).setDate(dataInizio.getDate()+6)).toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    }

    function selezionaGiorno(data) {
        curDate = data;
        curKey = `${data.getFullYear()}-${data.getMonth()+1}-${data.getDate()}`;
        document.getElementById('agenda-date-label').innerText = "Agenda " + data.toLocaleDateString('it-IT', {day:'numeric', month:'long'});
        renderCalendar();
        caricaAgenda();
    }

    // Gestione Agenda Suddivisa
    function aggiungiApt(user) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'it-IT';
        alert("Parla ora per inserire l'appuntamento...");
        recognition.start();
        recognition.onresult = (event) => {
            const testo = event.results[0][0].transcript;
            if (testo) db.ref("agenda/" + curKey).push({ testo: testo, user: user });
        };
    }

    function caricaAgenda() {
        const lista = document.getElementById('lista-appuntamenti');
        db.ref("agenda/" + curKey).on('value', snap => {
            lista.innerHTML = "";
            const dati = snap.val();
            if (!dati) { lista.innerHTML = "<div style='text-align:center;color:#ccc;padding:10px;'>Vuoto</div>"; return; }
            Object.keys(dati).forEach(id => {
                const item = dati[id];
                const label = item.user === 'm' ? '<span class="m-text">M:</span>' : '<span class="l-text">L:</span>';
                const div = document.createElement('div');
                div.className = "appuntamento-item";
                div.innerHTML = `<div>${label} ${item.testo}</div><span style="color:red;cursor:pointer" onclick="eliminaApt('${id}')">×</span>`;
                lista.appendChild(div);
            });
        });
    }

    function eliminaApt(id) { if(confirm("Elimina?")) db.ref("agenda/" + curKey + "/" + id).remove(); }

    // Input Vocale per Menù
    function avviaVocale(targetId) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'it-IT';
        recognition.start();
        recognition.onresult = (event) => {
            const speechToText = event.results[0][0].transcript;
            document.getElementById(targetId).value = speechToText;
            salvaDato(targetId, speechToText);
        };
    }

    // Gestione Foto (Base64 per semplicità su database)
    function uploadFoto(input, imgId) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const base64 = e.target.result;
            document.getElementById(imgId).src = base64;
            document.getElementById(imgId).style.display = 'block';
            salvaDato(imgId, base64);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function salvaDato(campo, valore) { db.ref("dailyData/" + curKey + "/" + campo).set(valore); }

    function apriDettaglio(data) {
        document.getElementById('modal-title').innerText = data.toLocaleDateString('it-IT', {day:'numeric', month:'long'});
        document.getElementById('modal').style.display = 'flex';
        db.ref("dailyData/" + curKey).once('value', snap => {
            const v = snap.val() || {};
            ['food-m', 'food-l'].forEach(id => document.getElementById(id).value = v[id] || "");
            ['img-m', 'img-l'].forEach(id => {
                if(v[id]) { 
                    document.getElementById(id).src = v[id]; 
                    document.getElementById(id).style.display = 'block';
                } else {
                    document.getElementById(id).style.display = 'none';
                }
            });
        });
    }

    function openTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active');
    }

    function chiudi() { document.getElementById('modal').style.display = 'none'; }
    function cambiaSett(n) { dataInizio.setDate(dataInizio.getDate()+n); renderCalendar(); }
    function apriScheda(u) { document.getElementById('view-src').src = (u === 'm' ? "Schedamassimo.jpg" : "schedaLiliana.jpg"); document.getElementById('img-viewer').style.display = 'flex'; }
    function ingrandisci(src) { document.getElementById('view-src').src = src; document.getElementById('img-viewer').style.display = 'flex'; }

    window.onload = () => { selezionaGiorno(new Date()); };
</script>
</body>
</html>
