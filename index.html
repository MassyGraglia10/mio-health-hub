<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Cloud Massimo & Liliana</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icona.png">
    <link rel="icon" type="image/png" href="icona.png">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2a9d8f; --bg: #f8f9fa; --accent: #e9c46a; --text: #264653; --secondary: #457b9d; --danger: #e76f51; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { text-align: center; background: var(--primary); color: white; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky; top:0; z-index:100; }
        
        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 15px; background: #fff; padding: 10px; border-bottom: 2px solid #ddd; }
        .btn-nav { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #current-week-display { font-weight: bold; color: var(--text); font-size: 0.9rem; }

        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; padding: 15px; max-width: 100%; margin: auto; }
        .menu-section { flex: 3; min-width: 350px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .day-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 6px solid var(--accent); }
        .day-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; color: var(--primary); text-align: center; border-bottom: 1px solid #eee; }
        
        .meal-box { margin-bottom: 15px; padding: 8px; border-radius: 10px; background: #fafafa; border: 1px solid #eee; }
        .meal-label { font-weight: bold; font-size: 0.8rem; color: #fff; margin-bottom: 5px; text-align: center; display: block; background: var(--secondary); border-radius: 4px; }
        
        .user-field { border-radius: 8px; padding: 8px; font-size: 0.95rem; border: 1px solid #ccc; resize: vertical; width: 100%; box-sizing: border-box; }
        .user-massimo { background-color: #e3f2fd; border-left: 5px solid #2196f3; margin-bottom: 8px; }
        .user-liliana { background-color: #fce4ec; border-left: 5px solid #e91e63; }
        
        .user-tag { font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; display: block; }
        .dispensa-section { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 120px; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { background: #e1ecf4; padding: 8px; border-radius: 15px; font-size: 0.85rem; cursor: pointer; border: 1px solid #ced4da; }
        #status { font-size: 0.8rem; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 Menu Massimo & Liliana</h1>
    <div id="status">Connessione...</div>
</div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-1)">◀ Indietro</button>
    <div id="current-week-display">Caricamento...</div>
    <button class="btn-nav" onclick="cambiaSettimana(1)">Avanti ▶</button>
</div>

<div class="main-wrapper">
    <div class="menu-section"><div id="grid-container" class="grid"></div></div>
    <div class="dispensa-section">
        <h3>🍎 Dispensa</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="nuovoCibo" placeholder="Aggiungi..." style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd;">
            <button onclick="aggiungiADispensa()" style="background:var(--secondary); color:white; border:none; padding:8px 15px; border-radius:6px;">+</button>
        </div>
        <div id="listaDispensa" class="chip-container"></div>
        <button onclick="svuotaSettimana()" style="background:var(--danger); color:white; border:none; padding:10px; border-radius:6px; width:100%; margin-top:20px; font-weight:bold;">🗑️ SVUOTA SETTIMANA</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51",
        storageBucket: "miomenu-e2e51.firebasestorage.app",
        messagingSenderId: "996699369968",
        appId: "1:996699369968:web:0cbdd7de424b093355ed35"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dataCorrente = new Date();
    // Spostiamo al lunedì corrente
    dataCorrente.setDate(dataCorrente.getDate() - (dataCorrente.getDay() === 0 ? 6 : dataCorrente.getDay() - 1));

    function getIDSettimana(d) {
        const lun = new Date(d);
        return lun.getFullYear() + "-" + (lun.getMonth() + 1).toString().padStart(2, '0') + "-" + lun.getDate().toString().padStart(2, '0');
    }

    function aggiornaLabelSettimana() {
        const fineSett = new Date(dataCorrente);
        fineSett.setDate(fineSett.getDate() + 6);
        document.getElementById('current-week-display').innerText = "Settimana: " + dataCorrente.toLocaleDateString() + " - " + fineSett.toLocaleDateString();
    }

    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = "";
        const giorni = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
        const pasti = ["Colazione", "Pranzo", "Cena"];
        
        giorni.forEach(giorno => {
            const card = document.createElement('div');
            card.className = 'day-card';
            let html = `<div class="day-title">${giorno}</div>`;
            pasti.forEach(pasto => {
                const idBase = `${giorno}-${pasto}`.toLowerCase().replace("ì", "i");
                html += `
                    <div class="meal-box">
                        <span class="meal-label">${pasto}</span>
                        <div class="user-input-group">
                            <div><span class="user-tag">♂ Massimo</span><textarea id="${idBase}-m" class="user-field user-massimo" rows="2" onfocus="lastFocusedId = this.id" oninput="autoSalvataggio()"></textarea></div>
                            <div><span class="user-tag">♀ Liliana</span><textarea id="${idBase}-l" class="user-field user-liliana" rows="2" onfocus="lastFocusedId = this.id" oninput="autoSalvataggio()"></textarea></div>
                        </div>
                    </div>`;
            });
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    let currentRef;
    function caricaDatiSettimana() {
        const weekID = getIDSettimana(dataCorrente);
        if(currentRef) currentRef.off();
        
        currentRef = db.ref('settimane/' + weekID);
        currentRef.on('value', (snap) => {
            const data = snap.val();
            document.querySelectorAll('textarea').forEach(t => t.value = ""); // Reset
            if (data) {
                Object.keys(data).forEach(id => {
                    const el = document.getElementById(id);
                    if (el && document.activeElement !== el) el.value = data[id];
                });
            }
            document.getElementById('status').innerText = "✅ Sincronizzato";
        });
    }

    // Dispensa (rimane globale, non legata alla settimana)
    db.ref('dispensa').on('value', snap => {
        const lista = snap.val() || [];
        const cont = document.getElementById('listaDispensa');
        cont.innerHTML = lista.map((c, i) => `<div class="chip"><span onclick="inserisci('${c.replace(/'/g, "\\'")}')">${c}</span><span style="margin-left:8px;color:red" onclick="rimuoviDaDispensa(${i})">×</span></div>`).join("");
    });

    function cambiaSettimana(diff) {
        dataCorrente.setDate(dataCorrente.getDate() + (diff * 7));
        aggiornaLabelSettimana();
        caricaDatiSettimana();
    }

    function autoSalvataggio() {
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        clearTimeout(window.timeoutSalvataggio);
        window.timeoutSalvataggio = setTimeout(() => {
            const weekID = getIDSettimana(dataCorrente);
            const dati = {};
            document.querySelectorAll('textarea').forEach(t => dati[t.id] = t.value);
            db.ref('settimane/' + weekID).set(dati);
        }, 800);
    }

    function aggiungiADispensa() {
        const input = document.getElementById('nuovoCibo');
        if (input.value) {
            db.ref('dispensa').once('value').then(snap => {
                let l = snap.val() || [];
                l.push(input.value);
                db.ref('dispensa').set(l);
                input.value = "";
            });
        }
    }

    function rimuoviDaDispensa(i) {
        db.ref('dispensa').once('value').then(snap => {
            let l = snap.val() || [];
            l.splice(i, 1);
            db.ref('dispensa').set(l);
        });
    }

    function inserisci(t) {
        if(!window.lastFocusedId) return;
        const a = document.getElementById(window.lastFocusedId);
        a.value += (a.value ? ", " : "") + t;
        autoSalvataggio();
    }

    function svuotaSettimana() {
        if(confirm("Svuotare questa settimana?")) {
            db.ref('settimane/' + getIDSettimana(dataCorrente)).remove();
        }
    }

    creaGriglia();
    aggiornaLabelSettimana();
    caricaDatiSettimana();
</script>
</body>
</html>
