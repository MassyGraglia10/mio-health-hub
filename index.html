    let dataInizio = new Date();
    dataInizio.setDate(dataInizio.getDate() - (dataInizio.getDay() === 0 ? 6 : dataInizio.getDay() - 1));
    let curKey = "";
    let dataCorrenteVisualizzata = new Date();
    let myChart = null;

    function openTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
        if(tabId === 'tab-report') generaReportEvoluto();
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let dot = document.createElement('div');
            dot.className = `day-dot ${d.toDateString()==new Date().toDateString()?'today':''}`;
            dot.onclick = () => apriDettaglio(new Date(d));
            dot.innerHTML = `<span style="font-size:0.6rem; color:#999; font-weight:bold;">${d.toLocaleDateString('it-IT',{weekday:'short'}).toUpperCase()}</span><span class="num">${d.getDate()}</span>`;
            grid.appendChild(dot);
        }
        document.getElementById('week-label').innerText = dataInizio.toLocaleDateString('it-IT',{day:'numeric',month:'short'}) + " - " + new Date(new Date(dataInizio).setDate(dataInizio.getDate()+6)).toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    }

    function apriDettaglio(data) {
        dataCorrenteVisualizzata = new Date(data);
        curKey = `${dataCorrenteVisualizzata.getFullYear()}-${dataCorrenteVisualizzata.getMonth()+1}-${dataCorrenteVisualizzata.getDate()}`;
        
        let gL = dataCorrenteVisualizzata.toLocaleDateString('it-IT', {weekday:'long'}); 
        gL = gL.charAt(0).toUpperCase() + gL.slice(1);
        
        document.getElementById('modal-title').innerText = gL + " " + dataCorrenteVisualizzata.getDate();
        document.getElementById('modal').style.display = 'flex';

        db.ref("dailyData/" + curKey).once('value', snapshot => {
            const v = snapshot.val() || {};
            const corsi = palinsesto[gL] || [];
            
            // Funzione migliorata per generare ID univoci basati su orario e nome corso
            const createList = (u) => corsi.map((c) => {
                const safeId = c.c.replace(/\s+/g, '').toLowerCase(); // Rimuove spazi dal nome corso
                const uniqueId = `chk-${u}-${c.t.replace(':','')}-${safeId}`;
                return `<div class="gym-row"><input type="checkbox" ${v[uniqueId]?'checked':''} onchange="salvaCheckV3(this,'${uniqueId}')"><b>${c.t}</b> ${c.c} <span class="instr">${c.i}</span></div>`
            }).join("");
            
            document.getElementById('gym-list-m').innerHTML = "<b>CORSI MASSIMO:</b>" + (createList('m') || "<br>Nessun corso");
            document.getElementById('gym-list-l').innerHTML = "<b>CORSI LILIANA:</b>" + (createList('l') || "<br>Nessun corso");

            const fields = ['peso-m','peso-l','alt-m','alt-l','col-m','col-l','pra-m','pra-l','cen-m','cen-l','note-m','note-l','run-m','altro-m','altro-l','play-m','play-l'];
            fields.forEach(id => { 
                if(document.getElementById(id)) {
                    document.getElementById(id).value = v[id] || "";
                }
            });

            document.getElementById('check-pesi-m').checked = v['check-pesi-m'] || false;
            document.getElementById('check-pesi-l').checked = v['check-pesi-l'] || false;
            
            if(document.getElementById('tab-report').classList.contains('active')) calcolaBMI();
        });
    }

    function navigaGiorno(n) {
        dataCorrenteVisualizzata.setDate(dataCorrenteVisualizzata.getDate() + n);
        apriDettaglio(new Date(dataCorrenteVisualizzata));
    }

    function salvaDato(el) { db.ref("dailyData/" + curKey + "/" + el.id).set(el.value); statusUpdate(); if(el.id.includes('peso') || el.id.includes('alt')) calcolaBMI(); }
    function salvaCheckV3(el, cid) { db.ref("dailyData/" + curKey + "/" + (cid || el.id)).set(el.checked); statusUpdate(); }
    function apriScheda(u) { document.getElementById('view-src').src = (u === 'm' ? "Schedamassimo.jpg" : "schedaLiliana.jpg") + "?v=" + Date.now(); document.getElementById('img-viewer').style.display = 'flex'; }

    function getIMCStatus(val) {
        if(val === "--" || isNaN(val)) return "";
        if(val < 18.5) return " (🔵 Sottopeso)";
        if(val < 25) return " (🟢 Regolare)";
        if(val < 30) return " (🟡 Sovrappeso)";
        return " (🔴 Obesità)";
    }

    function calcolaBMI() {
        const pm = parseFloat(document.getElementById('peso-m').value);
        const am = parseFloat(document.getElementById('alt-m').value) / 100;
        const pl = parseFloat(document.getElementById('peso-l').value);
        const al = parseFloat(document.getElementById('alt-l').value) / 100;
        let resM = (pm && am) ? (pm / (am * am)).toFixed(1) : "--";
        let resL = (pl && al) ? (pl / (al * al)).toFixed(1) : "--";
        document.getElementById('bmi-display').innerHTML = `<b>MASSIMO IMC:</b> ${resM}${getIMCStatus(resM)}<br><b>LILIANA IMC:</b> ${resL}${getIMCStatus(resL)}`;
    }

    async function generaReportEvoluto() {
        let labels = [], pM = [], pL = [];
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let k = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
            labels.push(d.getDate());
            const snap = await db.ref("dailyData/" + k).once('value');
            const v = snap.val() || {};
            pM.push(parseFloat(v['peso-m']) || null);
            pL.push(parseFloat(v['peso-l']) || null);
        }
        renderChart(labels, pM, pL);
        calcolaBMI();
    }

    function renderChart(labels, dataM, dataL) {
        if(myChart) myChart.destroy();
        const ctx = document.getElementById('weightChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Massimo', data: dataM, borderColor: '#2196f3', tension: 0.3, spanGaps: true },
                    { label: 'Liliana', data: dataL, borderColor: '#e91e63', tension: 0.3, spanGaps: true }
                ]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    function statusUpdate() { document.getElementById('sync-status').innerText = "☁️..."; setTimeout(()=>document.getElementById('sync-status').innerText="✅ SINCRO", 600); }
    function chiudi() { document.getElementById('modal').style.display = 'none'; }
    function cambiaSett(n) { dataInizio.setDate(dataInizio.getDate()+n); renderCalendar(); }
    window.onload = renderCalendar;
