<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M&L Smart Calendar</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #f8f9fa; --text: #2c3e50; --secondary: #546e7a; 
            --danger: #ef5350; --workout: #ba68c8; --weight: #ffa726; 
            --massimo: #2196f3; --liliana: #e91e63; --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Header & Nav */
        .header { text-align: center; background: var(--primary); color: white; padding: 20px; box-shadow: var(--shadow); }
        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; background: white; margin-bottom: 10px; }
        .btn-nav { background: #eee; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #current-week-display { font-weight: 800; color: var(--primary); font-size: 1.1rem; }

        /* Griglia Calendario */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 15px; padding: 20px; max-width: 800px; margin: auto; 
        }
        .day-dot { 
            background: white; aspect-ratio: 1/1; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .day-dot:active { transform: scale(0.9); }
        .day-dot.today { border-color: var(--primary); background: #e0f2f1; }
        .day-dot .num { font-size: 1.5rem; font-weight: 900; }
        .day-dot .name { font-size: 0.7rem; text-transform: uppercase; color: var(--secondary); }

        /* Modal (La finestra che si apre) */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; z-index: 1000; 
            backdrop-filter: blur(5px); justify-content: center; align-items: flex-end;
        }
        .modal-content { 
            background: white; width: 100%; max-width: 600px; height: 90vh; 
            border-top-left-radius: 30px; border-top-right-radius: 30px; 
            padding: 25px; box-sizing: border-box; overflow-y: auto; position: relative;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #ccc; }

        /* Contenuto Modal */
        .section-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--secondary); margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
        
        .gym-list { background: #f0f4f8; padding: 15px; border-radius: 15px; }
        .gym-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .weight-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .weight-box { flex: 1; background: #fff9f0; padding: 10px; border-radius: 12px; text-align: center; }
        .weight-field { width: 80%; border: 1px solid #ddd; border-radius: 8px; padding: 8px; text-align: center; font-weight: bold; margin-top: 5px; }

        .meal-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 10px; margin-top: 8px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; }
        .area-m { border-left: 5px solid var(--massimo); }
        .area-l { border-left: 5px solid var(--liliana); }

        .footer-tools { padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="month-name">Calendario M&L</h1>
    <div id="status" style="font-size: 0.7rem; opacity: 0.7;">Pronto</div>
</div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-7)">◀</button>
    <div id="current-week-display">Settimana Corrente</div>
    <button class="btn-nav" onclick="cambiaSettimana(7)">▶</button>
</div>

<div class="calendar-grid" id="calendar-grid">
    </div>

<div class="footer-tools">
    <button onclick="svuotaSettimana()" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">🗑️ Reset Dati Settimana</button>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="chiudiModal()">&times;</span>
        <h2 id="modal-date-title" style="color:var(--primary); margin-top:0;">Lunedì 24</h2>
        
        <div class="section-title">⚖️ Peso del mattino</div>
        <div class="weight-row">
            <div class="weight-box">
                <span style="font-size:0.7rem; font-weight:bold; color:var(--massimo)">MASSIMO</span>
                <input type="number" id="modal-peso-m" class="weight-field" step="0.1" oninput="salvaDatoLocale(this)">
            </div>
            <div class="weight-box">
                <span style="font-size:0.7rem; font-weight:bold; color:var(--liliana)">LILIANA</span>
                <input type="number" id="modal-peso-l" class="weight-field" step="0.1" oninput="salvaDatoLocale(this)">
            </div>
        </div>

        <div class="section-title">🏋️ Corsi Club Adriano</div>
        <div class="gym-list" id="modal-gym-list"></div>

        <div id="modal-meals-container">
            </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51",
        storageBucket: "miomenu-e2e51.firebasestorage.app",
        messagingSenderId: "996699369968",
        appId: "1:996699369968:web:0cbdd7de424b093355ed35"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const orarioPalestra = {
        "Lunedì": [{c:"Tone Up (Beppe)",t:"09:00"}, {c:"Acqua Fit",t:"10:15"}, {c:"Power & Funct",t:"12:00"}, {c:"Aero Dance",t:"18:00"}, {c:"Spinning",t:"19:00"}, {c:"Fit Boxe",t:"20:00"}],
        "Martedì": [{c:"Gym Dance",t:"09:00"}, {c:"Tone Up",t:"10:00"}, {c:"Pilates",t:"11:00"}, {c:"Latin Moove",t:"14:00"}, {c:"TRX",t:"19:00"}, {c:"Walking Tone",t:"20:00"}],
        "Mercoledì": [{c:"Posturale",t:"09:00"}, {c:"Tonificazione",t:"10:00"}, {c:"Total Body",t:"12:00"}, {c:"Yoga",t:"15:00"}, {c:"Pump",t:"20:00"}],
        "Giovedì": [{c:"Tone Up",t:"09:00"}, {c:"Pilates",t:"10:00"}, {c:"Power Yoga",t:"13:00"}, {c:"Total Body",t:"18:00"}, {c:"Latin Moove",t:"19:00"}],
        "Venerdì": [{c:"G.A.G",t:"09:00"}, {c:"Circuit",t:"10:00"}, {c:"Spinning",t:"13:00"}, {c:"Fit Dance",t:"18:00"}, {c:"Tone Up Light",t:"20:00"}],
        "Sabato": [{c:"Yoga",t:"09:00"}, {c:"Tone Up",t:"10:00"}, {c:"Fit Dance",t:"12:00"}],
        "Domenica": [{c:"Sala Pesi Aperta",t:"10:00-13:00"}]
    };

    let dataInizioSettimana = new Date();
    dataInizioSettimana.setDate(dataInizioSettimana.getDate() - (dataInizioSettimana.getDay() === 0 ? 6 : dataInizioSettimana.getDay() - 1));
    let giornoSelezionatoID = "";

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const display = document.getElementById('current-week-display');
        
        const fineSettimana = new Date(dataInizioSettimana);
        fineSettimana.setDate(dataInizioSettimana.getDate() + 6);
        display.innerText = dataInizioSettimana.toLocaleDateString('it-IT', {day:'2-digit', month:'short'}) + " - " + fineSettimana.toLocaleDateString('it-IT', {day:'2-digit', month:'short'});

        for(let i=0; i<7; i++) {
            const d = new Date(dataInizioSettimana);
            d.setDate(dataInizioSettimana.getDate() + i);
            const isToday = d.toDateString() === new Date().toDateString();
            
            const dot = document.createElement('div');
            dot.className = `day-dot ${isToday ? 'today' : ''}`;
            dot.onclick = () => apriModal(d);
            dot.innerHTML = `
                <span class="name">${d.toLocaleDateString('it-IT', {weekday:'short'})}</span>
                <span class="num">${d.getDate()}</span>
            `;
            grid.appendChild(dot);
        }
    }

    function apriModal(data) {
        giornoSelezionatoID = data.toLocaleDateString('it-IT', {weekday:'long'});
        const weekKey = getWeekKey(dataInizioSettimana);
        const dayKey = giornoSelezionatoID.toLowerCase().replace("ì", "i");
        
        document.getElementById('modal-date-title').innerText = giornoSelezionatoID + " " + data.getDate();
        document.getElementById('modal-overlay').style.display = 'flex';

        // Carica Corsi
        const corsi = orarioPalestra[giornoSelezionatoID] || [];
        document.getElementById('modal-gym-list').innerHTML = corsi.map(c => `<div class="gym-row"><span>${c.c}</span><span style="color:var(--workout); font-weight:bold;">${c.t}</span></div>`).join("");

        // Genera Campi Pasti
        const pasti = [{id:"colazione",n:"Colazione",i:"☕"}, {id:"pranzo",n:"Pranzo",i:"🍝"}, {id:"cena",n:"Cena",i:"🥩"}, {id:"allenamento",n:"Allenamento",i:"💪"}];
        let mealsHtml = "";
        pasti.forEach(p => {
            mealsHtml += `
                <div class="meal-card">
                    <div style="font-weight:bold; color:var(--secondary)">${p.i} ${p.n}</div>
                    <textarea id="${dayKey}-${p.id}-m" class="area-m" placeholder="Massimo..." oninput="salvaDatoLocale(this)"></textarea>
                    <textarea id="${dayKey}-${p.id}-l" class="area-l" placeholder="Liliana..." oninput="salvaDatoLocale(this)"></textarea>
                </div>`;
        });
        document.getElementById('modal-meals-container').innerHTML = mealsHtml;

        // Associa ID ai campi peso
        document.getElementById('modal-peso-m').id = `${dayKey}-peso-m`;
        document.getElementById('modal-peso-l').id = `${dayKey}-peso-l`;

        // Recupera dati da Firebase
        db.ref('settimane/' + weekKey).once('value', s => {
            const d = s.val() || {};
            document.querySelectorAll('.modal-content textarea, .modal-content input').forEach(el => {
                el.value = d[el.id] || "";
            });
        });
    }

    function salvaDatoLocale(el) {
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        const weekKey = getWeekKey(dataInizioSettimana);
        db.ref('settimane/' + weekKey).child(el.id).set(el.value);
        setTimeout(() => document.getElementById('status').innerText = "✅ Salvato", 1000);
    }

    function chiudiModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function cambiaSettimana(giorni) { dataInizioSettimana.setDate(dataInizioSettimana.getDate() + giorni); renderCalendar(); }
    function getWeekKey(d) { const l = new Date(d); return l.getFullYear() + "-" + (l.getMonth() + 1).toString().padStart(2, '0') + "-" + l.getDate().toString().padStart(2, '0'); }
    function svuotaSettimana() { if(confirm("Resettare i dati di questa settimana?")) { db.ref('settimane/' + getWeekKey(dataInizioSettimana)).remove(); renderCalendar(); } }

    window.onload = renderCalendar;
</script>
</body>
</html>
