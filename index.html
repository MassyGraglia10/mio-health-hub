<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M&L Wellness Planner v23</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #f4f7f6; --text: #2c3e50; 
            --massimo: #2196f3; --liliana: #e91e63;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        
        .header { text-align: center; background: var(--primary); color: white; padding: 15px; position: sticky; top:0; z-index:100; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; }
        .btn-nav { background: #eee; border: none; padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; padding: 15px; max-width: 900px; margin: auto; }
        .day-dot { background: white; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .day-dot.today { border: 2px solid var(--primary); background: #e0f2f1; }
        .day-dot .num { font-size: 1.6rem; font-weight: 900; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 100%; max-width: 600px; height: 94vh; border-radius: 30px 30px 0 0; display: flex; flex-direction: column; }
        
        .tab-bar { display: flex; background: #f0f0f0; margin: 10px 20px; border-radius: 15px; padding: 4px; }
        .tab-btn { flex: 1; border: none; padding: 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; cursor: pointer; background: transparent; color: #777; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .tab-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: none; }
        .tab-content.active { display: block; }

        .time-header { background: #eceff1; color: #546e7a; font-size: 0.7rem; font-weight: 800; padding: 6px 12px; border-radius: 20px; display: inline-block; margin: 15px 0 8px; text-transform: uppercase; }
        .card { background: white; border: 1px solid #eee; border-radius: 18px; padding: 12px; margin-bottom: 10px; }
        .user-header { font-size: 0.75rem; font-weight: 900; margin: 10px 0 5px; display: flex; align-items: center; gap: 5px; }
        
        textarea { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 10px; font-size: 0.95rem; background: #fafafa; box-sizing: border-box; resize: none; }
        .m-border { border-left: 5px solid var(--massimo); } .l-border { border-left: 5px solid var(--liliana); }
        
        .gym-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }
        .instr { font-size: 0.7rem; color: #999; margin-left: auto; }
        
        .btn-scheda { width: 100%; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; color: white; }
        .run-input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; }

        .playlist-row { background: #191414; color: white; padding: 12px; border-radius: 15px; margin-top: 8px; display: flex; align-items: center; justify-content: space-between; }
        .report-card { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        
        #img-viewer { position: fixed; inset: 0; background: black; z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size: 1.2rem;">🍱 M&L Smart Planner</h2>
    <div id="sync-status" style="font-size: 0.6rem; font-weight: bold;">✅ SINCRO ATTIVA</div>
</div>

<div class="nav-bar">
    <button class="btn-nav" onclick="cambiaSett(-7)">◀</button>
    <div id="week-label">...</div>
    <button class="btn-nav" onclick="cambiaSett(7)">▶</button>
</div>

<div class="calendar-grid" id="grid"></div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div style="padding: 20px 20px 0;">
            <span style="float:right; font-size:2rem; color:#ccc; cursor:pointer" onclick="chiudi()">×</span>
            <h2 id="modal-title" style="margin:0; color:var(--primary); font-size: 1.4rem;"></h2>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="openTab(event, 'tab-menu')">🍴 MENÙ</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-gym')">🏋️ GYM</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-report')">📊 REPORT</button>
        </div>

        <div id="tab-menu" class="tab-content active">
            <div class="time-header">☕ COLAZIONE</div>
            <div class="card m-border"><div class="user-header" style="color:var(--massimo)">MASSIMO</div><textarea id="col-m" rows="1" oninput="salvaDato(this)"></textarea></div>
            <div class="card l-border"><div class="user-header" style="color:var(--liliana)">LILIANA</div><textarea id="col-l" rows="1" oninput="salvaDato(this)"></textarea></div>
            
            <div class="time-header">🥗 PRANZO</div>
            <div class="card m-border"><textarea id="pra-m" rows="2" oninput="salvaDato(this)"></textarea></div>
            <div class="card l-border"><textarea id="pra-l" rows="2" oninput="salvaDato(this)"></textarea></div>

            <div class="time-header">🥩 CENA</div>
            <div class="card m-border"><textarea id="cen-m" rows="2" oninput="salvaDato(this)"></textarea></div>
            <div class="card l-border"><textarea id="cen-l" rows="2" oninput="salvaDato(this)"></textarea></div>
        </div>

        <div id="tab-gym" class="tab-content">
            <div class="time-header">👟 CORSI DEL GIORNO</div>
            <div id="gym-list" class="card"></div>

            <div class="time-header">🟦 AREA MASSIMO</div>
            <div class="card m-border">
                <label style="font-weight:bold; font-size:0.8rem;"><input type="checkbox" id="check-pesi-m" onchange="salvaCheckV3(this)"> SALA PESI COMPLETATA</label>
                <button class="btn-scheda" style="background:var(--massimo)" onclick="apriScheda('m')">📋 APRI SCHEDA MASSIMO</button>
                <input type="text" id="run-m" class="run-input" placeholder="Corsa: km o minuti..." oninput="salvaDato(this)">
            </div>

            <div class="time-header">🟥 AREA LILIANA</div>
            <div class="card l-border">
                <label style="font-weight:bold; font-size:0.8rem;"><input type="checkbox" id="check-pesi-l" onchange="salvaCheckV3(this)"> SALA PESI COMPLETATA</label>
                <button class="btn-scheda" style="background:var(--liliana)" onclick="apriScheda('l')">📋 APRI SCHEDA LILIANA</button>
                <input type="text" id="run-l" class="run-input" placeholder="Corsa: km o minuti..." oninput="salvaDato(this)">
            </div>
        </div>

        <div id="tab-report" class="tab-content">
            <div class="time-header">⚖️ PESO DEL MATTINO</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="report-card m-border">
                    <div class="user-header" style="color:var(--massimo)">MASSIMO (KG)</div>
                    <input type="number" id="peso-m" step="0.1" class="run-input" oninput="salvaDato(this)">
                </div>
                <div class="report-card l-border">
                    <div class="user-header" style="color:var(--liliana)">LILIANA (KG)</div>
                    <input type="number" id="peso-l" step="0.1" class="run-input" oninput="salvaDato(this)">
                </div>
            </div>

            <div class="time-header">📝 NOTE E PLAYLIST</div>
            <textarea id="note-giorno" rows="2" placeholder="Note giornata..." oninput="salvaDato(this)"></textarea>
            
            <div class="playlist-row" style="border-left: 5px solid var(--massimo);">
                <input type="text" id="pl-m" placeholder="Link Spotify M..." style="background:none; border:none; color:white; width:70%;" oninput="salvaDato(this)">
                <a id="link-m" href="#" target="_blank" style="color:#1DB954; font-weight:bold;">OPEN</a>
            </div>
            <div class="playlist-row" style="border-left: 5px solid var(--liliana);">
                <input type="text" id="pl-l" placeholder="Link Spotify L..." style="background:none; border:none; color:white; width:70%;" oninput="salvaDato(this)">
                <a id="link-l" href="#" target="_blank" style="color:#1DB954; font-weight:bold;">OPEN</a>
            </div>

            <div class="time-header">📈 RIEPILOGO SETTIMANALE</div>
            <div id="weekly-report" class="report-card" style="font-size: 0.85rem; line-height: 1.6;">
                Caricamento dati settimanali...
            </div>
        </div>
        <div style="height:50px"></div>
    </div>
</div>

<div id="img-viewer" onclick="this.style.display='none'">
    <div style="color:white; margin-bottom:10px;">CHIUDI [X]</div>
    <img id="view-src" style="max-width:95%; max-height:80%;">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const palinsesto = {
        "Lunedì": [{t:"09:00", c:"Tone Up", i:"Beppe"}, {t:"10:15", c:"Acqua Fit", i:"Francy"}, {t:"12:00", c:"Power & Functional", i:"Giorgio R."}, {t:"13:00", c:"Fat Burns", i:"Giorgio R."}, {t:"17:00", c:"Pilates", i:"Duilio"}, {t:"18:00", c:"Aero Dance", i:"Sonia"}, {t:"19:00", c:"Spinning", i:"Beppe"}, {t:"20:00", c:"Fit Boxe", i:"Vincenzo"}],
        "Martedì": [{t:"09:00", c:"Gym Dance", i:"Giuseppe"}, {t:"10:00", c:"Tone Up", i:"Duilio"}, {t:"11:00", c:"Pilates", i:"Duilio"}, {t:"12:00", c:"Aero Dance", i:"Nicola"}, {t:"13:00", c:"Tone Up", i:"Nicola"}, {t:"17:00", c:"Pilates", i:"Manuela"}, {t:"18:00", c:"Tone Up", i:"Beppe"}, {t:"19:00", c:"TRX", i:"Vincenzo"}, {t:"20:00", c:"Walking Tone", i:"Vincenzo"}],
        "Mercoledì": [{t:"09:00", c:"Posturale", i:"Roby"}, {t:"10:00", c:"Tonificazione", i:"Roby"}, {t:"12:00", c:"Total Body", i:"Franklin"}, {t:"13:00", c:"Total Body", i:"Simone L."}, {t:"15:00", c:"Yoga", i:"Riccardo"}, {t:"17:00", c:"Body Sculpture", i:"Duilio"}, {t:"18:00", c:"Mobility", i:"Duilio"}, {t:"19:00", c:"Tone Up", i:"Beppe"}, {t:"20:00", c:"Pump", i:"Vincenzo"}],
        "Giovedì": [{t:"09:00", c:"Tone Up", i:"Duilio"}, {t:"10:00", c:"Pilates", i:"Giuseppe"}, {t:"12:00", c:"Aero Dance", i:"Nicola"}, {t:"13:30", c:"Fit Boxe", i:"Giancarlo"}, {t:"17:00", c:"Pilates", i:"Manuela"}, {t:"18:00", c:"Total Body", i:"Vincenzo"}, {t:"19:00", c:"Latin Moove", i:"Sonia"}, {t:"20:00", c:"Body Cond.", i:"Beppe"}],
        "Venerdì": [{t:"09:00", c:"G.A.G", i:"Simo"}, {t:"10:00", c:"Circuit Training", i:"Simo"}, {t:"12:00", c:"Total Body", i:"Franklin"}, {t:"13:00", c:"Latin Moove", i:"Osvaldo"}, {t:"17:00", c:"Yoga", i:"Riccardo"}, {t:"18:00", c:"Fit Dance", i:"Sonia"}, {t:"19:00", c:"Tone Up", i:"Beppe"}],
        "Sabato": [{t:"09:00", c:"Yoga", i:"Giancarlo"}, {t:"10:00", c:"Tone Up", i:"Giancarlo"}, {t:"11:00", c:"Mobility", i:"Simona B."}, {t:"12:00", c:"Fit Dance", i:"Stefano P."}, {t:"13:00", c:"Latin Moove", i:"Osvaldo"}],
        "Domenica": [{t:"10:00", c:"Sala Pesi Libera", i:"Staff"}]
    };

    let dataInizio = new Date();
    dataInizio.setDate(dataInizio.getDate() - (dataInizio.getDay() === 0 ? 6 : dataInizio.getDay() - 1));
    let curKey = "";

    function openTab(evt, tabId) {
        let contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
        if(tabId === 'tab-report') generaReportSettimanale();
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let dot = document.createElement('div');
            dot.className = `day-dot ${d.toDateString()==new Date().toDateString()?'today':''}`;
            dot.onclick = () => apriDettaglio(new Date(d));
            dot.innerHTML = `<span style="font-size:0.65rem; color:#999; font-weight:bold;">${d.toLocaleDateString('it-IT',{weekday:'short'}).toUpperCase()}</span><span class="num">${d.getDate()}</span>`;
            grid.appendChild(dot);
        }
        document.getElementById('week-label').innerText = dataInizio.toLocaleDateString('it-IT',{day:'numeric',month:'short'}) + " - " + new Date(new Date(dataInizio).setDate(dataInizio.getDate()+6)).toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    }

    function apriDettaglio(data) {
        curKey = `${data.getFullYear()}-${data.getMonth()+1}-${data.getDate()}`;
        let gL = data.toLocaleDateString('it-IT', {weekday:'long'});
        gL = gL.charAt(0).toUpperCase() + gL.slice(1);
        document.getElementById('modal-title').innerText = gL + " " + data.getDate();
        document.getElementById('modal').style.display = 'flex';

        db.ref("dailyData/" + curKey).once('value', snapshot => {
            const v = snapshot.val() || {};
            const corsi = palinsesto[gL] || [];
            document.getElementById('gym-list').innerHTML = corsi.map((c, idx) => `
                <div class="gym-row"><input type="checkbox" ${v['chk-'+idx]?'checked':''} onchange="salvaCheckV3(this,'chk-${idx}')"><b>${c.t}</b> <span>${c.c}</span><span class="instr">${c.i}</span></div>
            `).join("") || "Nessun corso";

            const fields = ['peso-m','peso-l','col-m','col-l','pra-m','pra-l','cen-m','cen-l','note-giorno','run-m','run-l','pl-m','pl-l'];
            fields.forEach(id => {
                const el = document.getElementById(id);
                el.value = v[id] || "";
                if(id.startsWith('pl-')) document.getElementById('link-'+id.split('-')[1]).href = el.value || "#";
            });
            document.getElementById('check-pesi-m').checked = v['check-pesi-m'] || false;
            document.getElementById('check-pesi-l').checked = v['check-pesi-l'] || false;
        });
    }

    function salvaDato(el) { 
        db.ref("dailyData/" + curKey + "/" + el.id).set(el.value); 
        if(el.id.startsWith('pl-')) document.getElementById('link-'+el.id.split('-')[1]).href = el.value;
        statusUpdate(); 
    }

    function salvaCheckV3(el, cid) { db.ref("dailyData/" + curKey + "/" + (cid || el.id)).set(el.checked); statusUpdate(); }

    function apriScheda(u) {
        document.getElementById('view-src').src = (u === 'm' ? "Schedamassimo.jpg" : "schedaLiliana.jpg") + "?v=" + Date.now();
        document.getElementById('img-viewer').style.display = 'flex';
    }

    async function generaReportSettimanale() {
        const reportDiv = document.getElementById('weekly-report');
        let kmM = 0, kmL = 0, pesiM = 0, pesiL = 0;
        
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let k = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
            const snap = await db.ref("dailyData/" + k).once('value');
            const data = snap.val() || {};
            kmM += parseFloat(data['run-m']) || 0;
            kmL += parseFloat(data['run-l']) || 0;
            if(data['check-pesi-m']) pesiM++;
            if(data['check-pesi-l']) pesiL++;
        }

        reportDiv.innerHTML = `
            <strong>🏃‍♂️ MASSIMO:</strong> ${kmM.toFixed(1)} km totali | ${pesiM} sessioni pesi<br>
            <strong>🏃‍♀️ LILIANA:</strong> ${kmL.toFixed(1)} km totali | ${pesiL} sessioni pesi<br>
            <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
            <small>Il calcolo dei km funziona se inserisci solo numeri nel campo corsa.</small>
        `;
    }

    function statusUpdate() {
        document.getElementById('sync-status').innerText = "☁️ SALVATAGGIO...";
        setTimeout(() => document.getElementById('sync-status').innerText = "✅ SINCRO ATTIVA", 600);
    }

    function chiudi() { document.getElementById('modal').style.display = 'none'; }
    function cambiaSett(n) { dataInizio.setDate(dataInizio.getDate()+n); renderCalendar(); }
    window.onload = renderCalendar;
</script>
</body>
</html>
