<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Cloud Massimo & Liliana</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #fdfdfd; --text: #2c3e50; --secondary: #546e7a; 
            --danger: #ef5350; --workout: #ba68c8; --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --yoga: #8e44ad; --pilates: #2980b9; --mind: #16a085;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .header { text-align: center; background: var(--primary); color: white; padding: 10px; box-shadow: var(--shadow); position: sticky; top:0; z-index:100; }
        .header h1 { font-size: 1.2rem; margin: 0; }
        
        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 10px; background: #fff; padding: 10px; border-bottom: 1px solid #eee; position: sticky; top: 48px; z-index: 99; }
        .btn-nav { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        #current-week-display { font-weight: bold; font-size: 0.9rem; text-align: center; flex: 1; color: var(--primary); }
        
        .main-wrapper { display: flex; flex-direction: column; gap: 15px; padding: 10px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        
        .day-card { background: white; border-radius: 16px; padding: 15px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .day-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; color: var(--primary); text-align: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; text-transform: uppercase; }
        
        .meal-box { margin-bottom: 20px; }
        .meal-label { font-weight: bold; font-size: 0.85rem; color: #fff; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; background: var(--secondary); border-radius: 6px; padding: 5px 10px; width: fit-content; }
        .meal-label.workout { background: var(--workout) !important; }
        
        .user-row { margin-bottom: 12px; }
        .user-field { border-radius: 12px; padding: 10px; font-size: 0.95rem; border: 1px solid #ddd; width: 100%; box-sizing: border-box; resize: vertical; }
        .user-massimo { border-left: 5px solid #2196f3; }
        .user-liliana { border-left: 5px solid #e91e63; }
        .user-tag { font-size: 0.7rem; font-weight: bold; margin-bottom: 3px; display: block; text-transform: uppercase; color: #666; }
        
        .dispensa-section { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 15px; }
        .chip { background: #f1f3f4; padding: 6px 12px; border-radius: 16px; font-size: 0.85rem; cursor: pointer; border: 1px solid #dee2e6; }
        
        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .btn-workout-link { 
            display: block; width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; text-decoration: none; 
            text-align: center; margin-bottom: 10px; color: white; font-size: 0.9rem;
        }

        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; }
            .menu-section { flex: 4; }
            .dispensa-section { flex: 1; min-width: 300px; position: sticky; top: 120px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 Menu Cloud Massimo & Liliana</h1>
    <div id="status" style="font-size:0.7rem;">Connessione...</div>
</div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-1)">◀ SETT.</button>
    <div id="current-week-display">...</div>
    <button class="btn-nav" onclick="cambiaSettimana(1)">SUCC. ▶</button>
</div>

<div class="main-wrapper">
    <div class="menu-section">
        <div id="grid-container" class="grid"></div>

        <div class="workout-footer" style="background:#f8f9fa; padding:20px; border-radius:20px; margin-top:20px; border:1px solid #dee2e6;">
            <h3 style="color: var(--primary); margin-top:0;">🏋️ Area Allenamento</h3>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 15px;">Seleziona il profilo per aprire l'app dedicata con schede e tutorial video.</p>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <a href="palestra.html" class="btn-workout-link" style="flex:1; background:#2196f3;">♂ Scheda Massimo</a>
                <a href="palestra.html" class="btn-workout-link" style="flex:1; background:#e91e63;">♀ Scheda Liliana</a>
            </div>
            
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <a href="https://www.youtube.com/results?search_query=yoga+italiano" target="_blank" style="flex:1; background:var(--yoga); color:white; padding:12px; border-radius:10px; text-decoration:none; text-align:center; font-weight:bold; font-size:0.75rem;">YOGA</a>
                <a href="https://www.youtube.com/results?search_query=pilates+italiano" target="_blank" style="flex:1; background:var(--pilates); color:white; padding:12px; border-radius:10px; text-decoration:none; text-align:center; font-weight:bold; font-size:0.75rem;">PILATES</a>
                <a href="https://www.youtube.com/results?search_query=meditazione+guidata" target="_blank" style="flex:1; background:var(--mind); color:white; padding:12px; border-radius:10px; text-decoration:none; text-align:center; font-weight:bold; font-size:0.75rem;">MINDFULNESS</a>
            </div>
        </div>
    </div>
    
    <div class="dispensa-section">
        <h3>🍎 Dispensa Rapida</h3>
        <div class="input-group">
            <input type="text" id="nuovoCibo" placeholder="Aggiungi cibo...">
            <button class="btn-add" onclick="aggiungiADispensa()">+</button>
        </div>
        <div id="listaDispensa" class="chip-container"></div>
        <button onclick="svuotaSettimana()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; cursor:pointer; margin-top:30px;">🗑️ Svuota Settimana</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51",
        storageBucket: "miomenu-e2e51.firebasestorage.app",
        messagingSenderId: "996699369968",
        appId: "1:996699369968:web:0cbdd7de424b093355ed35"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let dataCorrente = new Date();
    dataCorrente.setDate(dataCorrente.getDate() - (dataCorrente.getDay() === 0 ? 6 : dataCorrente.getDay() - 1));
    window.lastFocusedId = null;

    function aggiungiADispensa() {
        const input = document.getElementById('nuovoCibo');
        const val = input.value.trim();
        if (val) {
            db.ref('dispensa').once('value').then(s => {
                let list = s.val() || [];
                list.push(val);
                db.ref('dispensa').set(list);
                input.value = "";
            });
        }
    }

    db.ref('dispensa').on('value', s => {
        const list = s.val() || [];
        document.getElementById('listaDispensa').innerHTML = list.map(c => 
            `<div class="chip" onclick="inserisciCibo('${c.replace(/'/g, "\\'")}')">${c}</div>`
        ).join("");
    });

    function inserisciCibo(c) {
        if (!window.lastFocusedId) return;
        const area = document.getElementById(window.lastFocusedId);
        area.value += (area.value ? ", " : "") + c;
        aggiornaTutto(area);
    }

    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = "";
        const giorni = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
        const pasti = [{n: "Colazione", i: "☕"}, {n: "Pranzo", i: "🍝"}, {n: "Cena", i: "🥩"}, {n: "Allenamento", i: "💪"}];
        
        giorni.forEach((g, idx) => {
            const dG = new Date(dataCorrente); dG.setDate(dataCorrente.getDate() + idx);
            const card = document.createElement('div');
            card.className = 'day-card';
            let h = `<div class="day-title">${g} ${dG.getDate()}/${dG.getMonth()+1}</div>`;
            pasti.forEach(p => {
                const id = `${g}-${p.n}`.toLowerCase().replace("ì", "i");
                h += `
                <div class="meal-box">
                    <span class="${p.n==='Allenamento'?'meal-label workout':'meal-label'}">${p.i} ${p.n}</span>
                    <div class="user-row">
                        <span class="user-tag">♂ Max</span>
                        <textarea id="${id}-m" class="user-field user-massimo" rows="2" onfocus="window.lastFocusedId=this.id" oninput="aggiornaTutto(this)"></textarea>
                    </div>
                    <div class="user-row">
                        <span class="user-tag">♀ Lili</span>
                        <textarea id="${id}-l" class="user-field user-liliana" rows="2" onfocus="window.lastFocusedId=this.id" oninput="aggiornaTutto(this)"></textarea>
                    </div>
                </div>`;
            });
            card.innerHTML = h;
            container.appendChild(card);
        });
    }

    function aggiornaTutto(el) {
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        const weekID = getIDSettimana(dataCorrente);
        const data = {};
        document.querySelectorAll('textarea').forEach(t => data[t.id] = t.value);
        db.ref('settimane/' + weekID).update(data).then(() => {
            document.getElementById('status').innerText = "✅ Sincronizzato";
        });
    }

    function caricaDatiSettimana() {
        const weekID = getIDSettimana(dataCorrente);
        db.ref('settimane/' + weekID).on('value', (s) => {
            const dat = s.val() || {};
            document.querySelectorAll('textarea').forEach(t => { 
                if(document.activeElement !== t) t.value = dat[t.id] || ""; 
            });
        });
    }

    function getIDSettimana(d) { return d.getFullYear() + "-" + (d.getMonth() + 1).toString().padStart(2, '0') + "-" + d.getDate().toString().padStart(2, '0'); }
    function aggiornaLabelSettimana() { const fS = new Date(dataCorrente); fS.setDate(fS.getDate() + 6); document.getElementById('current-week-display').innerText = dataCorrente.toLocaleDateString() + " - " + fS.toLocaleDateString(); }
    function cambiaSettimana(diff) { dataCorrente.setDate(dataCorrente.getDate() + (diff * 7)); aggiornaLabelSettimana(); creaGriglia(); caricaDatiSettimana(); }
    function svuotaSettimana() { if(confirm("Svuotare settimana?")) db.ref('settimane/' + getIDSettimana(dataCorrente)).remove(); }

    window.onload = () => { creaGriglia(); aggiornaLabelSettimana(); caricaDatiSettimana(); };
</script>
</body>
</html>
