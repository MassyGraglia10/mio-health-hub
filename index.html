<div class="modal-content">
    <div class="modal-header">
        <h2 id="modal-title"></h2>
        <span class="close-btn" onclick="chiudi()">×</span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="openTab(event, 'tab-gym')">🏋️ GYM</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-relax')">🧘 RELAX</button>
    </div>

    <div id="tab-gym" class="tab-content active">
        <div class="time-header">🏋️ SALA PESI</div>
        <div class="card m-border">
            <label><input type="checkbox" id="check-pesi-m" onchange="salvaCheck(this)"> SALA PESI M.</label>
            <button class="btn-view bg-massimo" onclick="apriScheda('m')">SCHEDA MASSIMO</button>
        </div>
        <div class="card l-border">
            <label><input type="checkbox" id="check-pesi-l" onchange="salvaCheck(this)"> SALA PESI L.</label>
            <button class="btn-view bg-liliana" onclick="apriScheda('l')">SCHEDA LILIANA</button>
        </div>

        <div class="time-header">📅 CORSI DEL GIORNO</div>
        <div id="gym-list-m" class="card m-border"></div>
        <div id="gym-list-l" class="card l-border"></div>
    </div>

    <div id="tab-relax" class="tab-content">
        <div class="time-header">🎵 MUSICA & SPOTIFY</div>
        <div class="flex-group">
            <button class="btn-view bg-massimo" onclick="window.open('spotify:','_blank')">🎧 SPOTY MASSY</button>
            <button class="btn-view bg-liliana" onclick="window.open('spotify:','_blank')">🎧 SPOTY LILLY</button>
        </div>

        <div class="time-header">🎬 VIDEO & BENESSERE</div>
        <button class="btn-view bg-relax" onclick="window.open('https://www.youtube.com/results?search_query=pilates+workout+italiano','_blank')">🧘 PILATES</button>
        <button class="btn-view bg-relax" onclick="window.open('https://www.youtube.com/results?search_query=yoga+session+italiano','_blank')">🧘 YOGA</button>
        <button class="btn-view bg-relax" onclick="window.open('https://www.youtube.com/results?search_query=meditazione+guidata','_blank')">🧠 MEDITAZIONE</button>
        <button class="btn-view bg-relax" onclick="window.open('https://www.youtube.com/results?search_query=rumore+del+mare+rilassante','_blank')">🌊 MARE RILASSANTE</button>
    </div>
</div>
