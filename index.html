<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massy & Lilly Gym</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #26a69a; --bg: #f4f7f6; --massimo: #2196f3; --liliana: #e91e63; --relax: #9c27b0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #2c3e50; }
        .header { text-align: center; background: var(--primary); color: white; padding: 12px; position: sticky; top:0; z-index:100; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; border-bottom: 1px solid #eee; }
        .btn-nav { background: #eee; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 12px; }
        .day-dot { background: white; border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; }
        .day-dot.selected { background: var(--primary); color: white; }
        .day-dot.today { border: 2px solid var(--primary); }
        
        .agenda-section { padding: 15px; margin: 0 12px 20px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .agenda-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-add { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .appuntamento-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .appuntamento-item:last-child { border-bottom: none; }
        .cal-link { text-decoration: none; font-size: 1.2rem; margin-right: 10px; filter: grayscale(1); transition: 0.2s; }
        .cal-link:hover { filter: grayscale(0); }
        .btn-del { color: #ff5252; font-weight: bold; padding: 5px; cursor: pointer; font-size: 1.2rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: white; height: 90vh; border-radius: 25px 25px 0 0; overflow-y: auto; padding: 20px; }
        .tab-bar { display: flex; background: #f0f0f0; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; background: transparent; color: #888; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 5px solid #ccc; }
        .m-border { border-left-color: var(--massimo); }
        .l-border { border-left-color: var(--liliana); }
        .time-header { background: #eceff1; color: #546e7a; font-size: 0.7rem; font-weight: 800; padding: 5px 12px; border-radius: 20px; display: inline-block; margin: 15px 0 8px; text-transform: uppercase; }
        .btn-view { border: none; padding: 12px; border-radius: 12px; color: white; width: 100%; font-weight: bold; margin-top: 8px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        #img-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 2000; align-items: center; justify-content: center; }
        #img-viewer img { max-width: 95%; max-height: 85%; border: 3px solid white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2>🏋️ Massy & Lilly</h2>
    <div id="sync-status" style="font-size: 0.6rem;">✅ DATABASE ATTIVO</div>
</div>

<div class="nav-bar">
    <button class="btn-nav" onclick="cambiaSett(-7)">◀</button>
    <div id="week-label" style="font-weight:bold;">...</div>
    <button class="btn-nav" onclick="cambiaSett(7)">▶</button>
</div>

<div class="calendar-grid" id="grid"></div>

<div class="agenda-section">
    <div class="agenda-header">
        <h3 id="agenda-date-label" style="margin:0; font-size:1rem; color:var(--primary);">Agenda</h3>
        <button class="btn-add" onclick="aggiungiAppuntamento()">+</button>
    </div>
    <div id="lista-appuntamenti">
        <div style="color:#bbb; text-align:center; padding:10px;">Seleziona un giorno...</div>
    </div>
</div>

<div style="padding: 0 15px;">
    <button class="btn-view" style="background:#455a64;" onclick="apriDettaglio(curDate)">⚙️ GESTISCI ALLENAMENTO</button>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="modal-title" style="color:var(--primary); margin:0;"></h2>
            <span style="font-size:2.5rem; color:#ccc; cursor:pointer;" onclick="chiudi()">×</span>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="openTab(event, 'tab-gym')">🏋️ GYM</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-relax')">🧘 RELAX</button>
        </div>
        <div id="tab-gym" class="tab-content active">
            <div class="time-header">🏋️ SALA PESI</div>
            <div class="card m-border">
                <label><input type="checkbox" id="check-pesi-m" onchange="salvaCheck(this)"> SALA PESI M.</label>
                <button class="btn-view" style="background:var(--massimo)" onclick="apriScheda('m')">📋 SCHEDA MASSY</button>
            </div>
            <div class="card l-border">
                <label><input type="checkbox" id="check-pesi-l" onchange="salvaCheck(this)"> SALA PESI L.</label>
                <button class="btn-view" style="background:var(--liliana)" onclick="apriScheda('l')">📋 SCHEDA LILLY</button>
            </div>
            <div class="time-header">📅 CORSI</div>
            <div id="gym-list-m" class="card m-border"></div>
            <div id="gym-list-l" class="card l-border"></div>
        </div>
        <div id="tab-relax" class="tab-content">
            <div class="time-header">🎵 MUSICA</div>
            <button class="btn-view" style="background:var(--relax)" onclick="window.open('https://www.youtube.com/results?search_query=meditazione+guidata','_blank')">🧠 MEDITAZIONE</button>
        </div>
    </div>
</div>

<div id="img-viewer" onclick="this.style.display='none'"><img id="view-src"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc", authDomain: "miomenu-e2e51.firebaseapp.com", databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", projectId: "miomenu-e2e51" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const palinsesto = {
        "Lunedì": [{t:"09:00", c:"TONE UP"}, {t:"12:00", c:"POWER & FUNCTIONAL"}, {t:"18:00", c:"S. PUMP"}],
        "Martedì": [{t:"10:00", c:"TONE UP"}, {t:"13:00", c:"TONE UP"}, {t:"19:00", c:"TRX"}],
        "Mercoledì": [{t:"09:00", c:"POSTURALE"}, {t:"13:00", c:"TOTAL BODY"}, {t:"18:00", c:"G.A.G"}],
        "Giovedì": [{t:"10:00", c:"PILATES"}, {t:"13:00", c:"POWER YOGA"}, {t:"19:00", c:"SPINNING"}],
        "Venerdì": [{t:"09:00", c:"G.A.G"}, {t:"12:00", c:"TOTAL BODY"}, {t:"18:00", c:"FIT DANCE"}],
        "Sabato": [{t:"09:00", c:"YOGA"}, {t:"12:00", c:"FIT DANCE"}],
        "Domenica": [{t:"10:00", c:"SALA PESI"}]
    };

    let dataInizio = new Date();
    dataInizio.setDate(dataInizio.getDate() - (dataInizio.getDay() === 0 ? 6 : dataInizio.getDay() - 1));
    let curKey = "";
    let curDate = new Date();

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let dot = document.createElement('div');
            const isToday = d.toDateString() == new Date().toDateString();
            const isSelected = d.toDateString() == curDate.toDateString();
            dot.className = `day-dot ${isToday?'today':''} ${isSelected?'selected':''}`;
            dot.onclick = () => selezionaGiorno(new Date(d));
            dot.innerHTML = `<div style="font-size:0.6rem;">${d.toLocaleDateString('it-IT',{weekday:'short'}).toUpperCase()}</div><b style="font-size:1.2rem;">${d.getDate()}</b>`;
            grid.appendChild(dot);
        }
        document.getElementById('week-label').innerText = dataInizio.toLocaleDateString('it-IT',{day:'numeric',month:'short'}) + " - " + new Date(new Date(dataInizio).setDate(dataInizio.getDate()+6)).toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    }

    function selezionaGiorno(data) {
        curDate = data;
        curKey = `${data.getFullYear()}-${data.getMonth()+1}-${data.getDate()}`;
        document.getElementById('agenda-date-label').innerText = "Agenda " + data.toLocaleDateString('it-IT', {day:'numeric', month:'long'});
        renderCalendar();
        caricaAgenda();
    }

    function generaLinkCalendario(titolo, dataObj) {
        const y = dataObj.getFullYear();
        const m = (dataObj.getMonth() + 1).toString().padStart(2, '0');
        const d = dataObj.getDate().toString().padStart(2, '0');
        const dataFormattata = `${y}${m}${d}`;
        // Link Google Calendar: crea un evento tutto il giorno. 
        // Nota: Assicurati che nelle impostazioni del calendario sul telefono sia attivo l'avviso predefinito "1 giorno prima".
        return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(titolo)}&dates=${dataFormattata}/${dataFormattata}&details=Promemoria+Massy+Lilly+Gym&sf=true&output=xml`;
    }

    function caricaAgenda() {
        const lista = document.getElementById('lista-appuntamenti');
        db.ref("agenda/" + curKey).on('value', snap => {
            const dati = snap.val();
            lista.innerHTML = "";
            if (!dati) {
                lista.innerHTML = "<div style='color:#ccc; font-style:italic; font-size:0.8rem; text-align:center; padding:10px;'>Nessun impegno salvato</div>";
                return;
            }
            Object.keys(dati).forEach(id => {
                const item = dati[id];
                const linkCal = generaLinkCalendario(item.testo, curDate);
                const div = document.createElement('div');
                div.className = "appuntamento-item";
                div.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <a href="${linkCal}" target="_blank" class="cal-link" title="Aggiungi al calendario del telefono">📅</a>
                        <span>${item.testo}</span>
                    </div>
                    <span class="btn-del" onclick="eliminaAppuntamento('${id}')">×</span>`;
                lista.appendChild(div);
            });
        });
    }

    function aggiungiAppuntamento() {
        const testo = prompt("Cosa c'è in programma?");
        if (testo) db.ref("agenda/" + curKey).push({ testo: testo });
    }

    function eliminaAppuntamento(id) {
        if(confirm("Eliminare l'impegno?")) db.ref("agenda/" + curKey + "/" + id).remove();
    }

    function apriDettaglio(data) {
        let gL = data.toLocaleDateString('it-IT', {weekday:'long'}); gL = gL.charAt(0).toUpperCase() + gL.slice(1);
        document.getElementById('modal-title').innerText = gL + " " + data.getDate();
        document.getElementById('modal').style.display = 'flex';
        db.ref("dailyData/" + curKey).once('value', snap => {
            const v = snap.val() || {};
            document.getElementById('check-pesi-m').checked = v['check-pesi-m'] || false;
            document.getElementById('check-pesi-l').checked = v['check-pesi-l'] || false;
            const build = (u) => (palinsesto[gL] || []).map(c => {
                const id = `chk-${u}-${c.t.replace(':','')}`;
                return `<div style="padding:5px 0;"><input type="checkbox" ${v[id]?'checked':''} onchange="salvaCheck(this,'${id}')"> ${c.t} - ${c.c}</div>`;
            }).join("");
            document.getElementById('gym-list-m').innerHTML = "<b>M:</b>" + build('m');
            document.getElementById('gym-list-l').innerHTML = "<b>L:</b>" + build('l');
        });
    }

    function openTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); e.currentTarget.classList.add('active');
    }

    function salvaCheck(el, id) { db.ref("dailyData/" + curKey + "/" + (id||el.id)).set(el.checked); }
    function chiudi() { document.getElementById('modal').style.display = 'none'; }
    function cambiaSett(n) { dataInizio.setDate(dataInizio.getDate()+n); renderCalendar(); }
    function apriScheda(u) { document.getElementById('view-src').src = (u === 'm' ? "Schedamassimo.jpg" : "schedaLiliana.jpg"); document.getElementById('img-viewer').style.display = 'flex'; }

    window.onload = () => { selezionaGiorno(new Date()); };
</script>
</body>
</html>
