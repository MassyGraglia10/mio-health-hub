<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Hub Massimo & Liliana</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #fdfdfd; --text: #2c3e50; --secondary: #546e7a; 
            --danger: #ef5350; --workout: #ba68c8; --success: #4caf50; --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --yoga: #8e44ad; --pilates: #2980b9; --mind: #16a085;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .header { text-align: center; background: var(--primary); color: white; padding: 10px; box-shadow: var(--shadow); position: sticky; top:0; z-index:100; }
        .header h1 { font-size: 1.2rem; margin: 0; }
        #status { font-size: 0.7rem; font-weight: bold; opacity: 0.8; }
        
        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 10px; background: #fff; padding: 10px; border-bottom: 1px solid #eee; position: sticky; top: 48px; z-index: 99; }
        .btn-nav { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        #current-week-display { font-weight: bold; font-size: 0.9rem; text-align: center; flex: 1; color: var(--primary); }
        
        .main-wrapper { display: flex; flex-direction: column; gap: 15px; padding: 10px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        
        .day-card { background: white; border-radius: 16px; padding: 15px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .day-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; color: var(--primary); text-align: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; text-transform: uppercase; }
        
        .meal-box { margin-bottom: 20px; }
        .meal-label { font-weight: bold; font-size: 0.85rem; color: #fff; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; background: var(--secondary); border-radius: 6px; padding: 5px 10px; width: fit-content; }
        .meal-label.workout { background: var(--workout) !important; }
        
        .user-row { position: relative; margin-bottom: 12px; }
        .health-badge { display: none; font-size: 0.65rem; color: #fff; font-weight: 900; position: absolute; right: 5px; top: -12px; padding: 2px 8px; border-radius: 8px; z-index: 10; }
        .status-ok { background: var(--success); }
        .status-ko { background: var(--danger); }
        
        .user-field { border-radius: 12px; padding: 10px; font-size: 0.95rem; border: 1px solid #ddd; resize: vertical; width: 100%; box-sizing: border-box; transition: all 0.2s; }
        .user-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(38, 166, 154, 0.1); }
        
        .user-massimo { border-left: 5px solid #2196f3; }
        .user-liliana { border-left: 5px solid #e91e63; }
        .user-tag { font-size: 0.7rem; font-weight: bold; margin-bottom: 3px; display: block; text-transform: uppercase; color: #666; }
        
        /* Sezione Allenamento */
        .workout-section { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .workout-link-card { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .yt-btn { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; font-size: 0.9rem; transition: transform 0.2s; }
        .yt-btn:active { transform: scale(0.98); }
        .btn-yoga { background: var(--yoga); }
        .btn-pilates { background: var(--pilates); }
        .btn-mind { background: var(--mind); }
        
        .copy-hint { font-size: 0.7rem; opacity: 0.8; font-weight: normal; }

        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; }
            .menu-section { flex: 4; }
            .workout-section { flex: 1; min-width: 300px; position: sticky; top: 120px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🧘 Health Hub Massimo & Liliana</h1>
    <div id="status">Connessione...</div>
</div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-1)">◀ SETT.</button>
    <div id="current-week-display">...</div>
    <button class="btn-nav" onclick="cambiaSettimana(1)">SUCC. ▶</button>
</div>

<div class="main-wrapper">
    <div class="menu-section">
        <div id="grid-container" class="grid"></div>
    </div>
    
    <div class="workout-section">
        <h3>🏠 Allenamenti a Casa</h3>
        <p style="font-size: 0.8rem; color: #666;">Clicca per guardare su YouTube o per aggiungere al menu.</p>
        
        <div class="workout-link-card">
            <div style="border: 1px solid #eee; border-radius: 12px; padding: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <strong style="color:var(--yoga)">YOGA</strong>
                    <button onclick="copiaAllenamento('Yoga')" style="font-size:0.7rem; cursor:pointer;">➕ Aggiungi</button>
                </div>
                <a href="https://www.youtube.com/watch?v=649m8Si5dVA" target="_blank" class="yt-btn btn-yoga">
                    Inizia da Zero (10 min) <span>▶</span>
                </a>
            </div>

            <div style="border: 1px solid #eee; border-radius: 12px; padding: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <strong style="color:var(--pilates)">PILATES</strong>
                    <button onclick="copiaAllenamento('Pilates')" style="font-size:0.7rem; cursor:pointer;">➕ Aggiungi</button>
                </div>
                <a href="https://www.youtube.com/watch?v=Eqv0aL2ovDU" target="_blank" class="yt-btn btn-pilates">
                    Principianti (20 min) <span>▶</span>
                </a>
            </div>

            <div style="border: 1px solid #eee; border-radius: 12px; padding: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <strong style="color:var(--mind)">MINDFULNESS</strong>
                    <button onclick="copiaAllenamento('Mindfulness')" style="font-size:0.7rem; cursor:pointer;">➕ Aggiungi</button>
                </div>
                <a href="https://www.youtube.com/watch?v=ohrGV_sm9E4" target="_blank" class="yt-btn btn-mind">
                    Meditazione Respiro <span>▶</span>
                </a>
            </div>
        </div>

        <button onclick="svuotaSettimana()" class="btn-nav" style="width:100%; margin-top:30px; background:var(--danger)">🗑️ Svuota Settimana</button>
    </div>
</div>

<script>
    // Configurazione Firebase (Stessa di prima)
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51",
        storageBucket: "miomenu-e2e51.firebasestorage.app",
        messagingSenderId: "996699369968",
        appId: "1:996699369968:web:0cbdd7de424b093355ed35"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let dataCorrente = new Date();
    dataCorrente.setDate(dataCorrente.getDate() - (dataCorrente.getDay() === 0 ? 6 : dataCorrente.getDay() - 1));

    function copiaAllenamento(tipo) {
        if(!window.lastFocusedId || !window.lastFocusedId.includes("allenamento")) {
            alert("Prima clicca sulla casella 'Allenamento' di un giorno per selezionarla!");
            return;
        }
        const field = document.getElementById(window.lastFocusedId);
        field.value = tipo;
        aggiornaTutto(field);
    }

    // --- LOGICA SALUTE E GRIGLIA (Mantenuta e ottimizzata) ---
    const cibiRischio = { "dolci": 3, "fritto": 3, "alcol": 2, "pizza": 2.5, "formaggio": 2 };

    function checkHealth(textarea) {
        if (!textarea || textarea.id.includes("allenamento")) return;
        const text = textarea.value.toLowerCase();
        const row = textarea.closest('.user-row');
        const badge = row.querySelector('.health-badge');
        const suffix = textarea.id.endsWith("-m") ? "-m" : "-l";
        const day = textarea.id.split('-')[0];
        const hasWorkout = document.getElementById(`${day}-allenamento${suffix}`).value.trim() !== "";

        let punteggio = 0;
        Object.keys(cibiRischio).forEach(c => { if (text.includes(c)) punteggio += cibiRischio[c]; });
        
        badge.style.display = text ? "block" : "none";
        const isOk = punteggio < (hasWorkout ? 2.5 : 1.5);
        badge.innerText = isOk ? "✅ OK" : "❌ KO";
        badge.className = "health-badge " + (isOk ? "status-ok" : "status-ko");
    }

    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = "";
        const giorni = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
        const pasti = [{n: "Colazione", i: "☕"}, {n: "Pranzo", i: "🍝"}, {n: "Cena", i: "🥩"}, {n: "Allenamento", i: "💪"}];
        
        giorni.forEach((g, idx) => {
            const dG = new Date(dataCorrente); dG.setDate(dataCorrente.getDate() + idx);
            const card = document.createElement('div');
            card.className = 'day-card';
            let h = `<div class="day-title">${g} ${dG.getDate()}/${dG.getMonth()+1}</div>`;
            pasti.forEach(p => {
                const idB = `${g}-${p.n}`.toLowerCase().replace("ì", "i");
                h += `
                <div class="meal-box">
                    <span class="${p.n==='Allenamento'?'meal-label workout':'meal-label'}">${p.i} ${p.n}</span>
                    <div class="user-row"><span class="health-badge"></span><span class="user-tag">♂ Max</span>
                        <textarea id="${idB}-m" class="user-field user-massimo" rows="2" onfocus="window.lastFocusedId=this.id" oninput="aggiornaTutto(this)"></textarea></div>
                    <div class="user-row"><span class="health-badge"></span><span class="user-tag">♀ Lili</span>
                        <textarea id="${idB}-l" class="user-field user-liliana" rows="2" onfocus="window.lastFocusedId=this.id" oninput="aggiornaTutto(this)"></textarea></div>
                </div>`;
            });
            card.innerHTML = h;
            container.appendChild(card);
        });
    }

    function aggiornaTutto(el) {
        checkHealth(el);
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        clearTimeout(window.tS);
        window.tS = setTimeout(() => {
            const d = {}; document.querySelectorAll('textarea').forEach(t => d[t.id] = t.value);
            db.ref('settimane/' + getIDSettimana(dataCorrente)).update(d);
            document.getElementById('status').innerText = "✅ Salvato";
        }, 800);
    }

    function caricaDatiSettimana() {
        db.ref('settimane/' + getIDSettimana(dataCorrente)).on('value', (s) => {
            const dat = s.val() || {};
            document.querySelectorAll('textarea').forEach(t => { 
                if(document.activeElement !== t) { t.value = dat[t.id] || ""; checkHealth(t); } 
            });
        });
    }

    function getIDSettimana(d) { return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate(); }
    function cambiaSettimana(diff) { dataCorrente.setDate(dataCorrente.getDate() + (diff * 7)); creaGriglia(); caricaDatiSettimana(); aggiornaLabel(); }
    function aggiornaLabel() { document.getElementById('current-week-display').innerText = "Settimana del " + dataCorrente.toLocaleDateString(); }
    function svuotaSettimana() { if(confirm("Svuotare tutto?")) db.ref('settimane/' + getIDSettimana(dataCorrente)).remove(); }

    window.onload = () => { creaGriglia(); caricaDatiSettimana(); aggiornaLabel(); };
</script>
</body>
</html>
