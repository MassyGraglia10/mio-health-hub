<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massy e Lilly v40 - Hydration & Food</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #f4f7f6; --text: #2c3e50; 
            --massimo: #2196f3; --liliana: #e91e63;
            --water-bg: #e1f5fe; --water-ok: #00b0ff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .header { text-align: center; background: var(--primary); color: white; padding: 12px; position: sticky; top:0; z-index:100; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; border-bottom: 1px solid #eee; }
        .btn-nav { background: #eee; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; padding: 12px; }
        .day-dot { background: white; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .day-dot.today { border: 2px solid var(--primary); background: #e0f2f1; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-width: 600px; height: 95vh; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #f0f0f0; margin: 10px; border-radius: 12px; padding: 4px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; cursor: pointer; background: transparent; color: #777; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .tab-content { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; box-sizing: border-box; }
        .tab-content.active { display: block; }

        .card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 12px; margin-bottom: 12px; transition: all 0.3s ease; }
        .m-border { border-left: 5px solid var(--massimo); } .l-border { border-left: 5px solid var(--liliana); }
        
        textarea { width: 100%; border: 1px solid #f0f0f0; border-radius: 8px; padding: 10px; font-size: 0.9rem; background: #fafafa; box-sizing: border-box; }
        
        /* Quick Tags */
        .quick-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .tag-btn { background: white; border: 1px solid #ddd; border-radius: 20px; padding: 4px 10px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .tag-btn:active { transform: scale(0.95); background: #f0f0f0; }

        /* Water Tracker */
        .water-card { background: var(--water-bg); border-radius: 20px; padding: 15px; text-align: center; }
        .water-card.goal-reached { background: #b3e5fc; border: 2px solid var(--water-ok); }
        .drops-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .drop { font-size: 1.6rem; cursor: pointer; filter: grayscale(1); opacity: 0.3; transition: 0.2s; }
        .drop.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); }
        .water-label { font-weight: 900; color: #0277bd; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size: 1.1rem;">🍱 Massy e Lilly</h2>
    <div id="sync-status" style="font-size: 0.6rem;">✅ SINCRO ATTIVA</div>
</div>

<div class="nav-bar">
    <button class="btn-nav" onclick="cambiaSett(-7)">◀</button>
    <div id="week-label" style="font-weight:bold; color:var(--primary);">...</div>
    <button class="btn-nav" onclick="cambiaSett(7)">▶</button>
</div>

<div class="calendar-grid" id="grid"></div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div class="modal-header" style="display:flex; justify-content:space-between; padding:15px 20px;">
            <button class="btn-nav" onclick="navigaGiorno(-1)">◀</button>
            <h3 id="modal-title" style="margin:0; color:var(--primary);"></h3>
            <button class="btn-nav" onclick="navigaGiorno(1)">▶</button>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="openTab(event, 'tab-menu')">🍴 DIARIO</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-wellness')">💧 WELLNESS</button>
        </div>

        <div id="tab-menu" class="tab-content active">
            <h4 style="margin:5px 0; font-size:0.7rem; color:#888;">🥗 PRANZO</h4>
            <div class="card m-border">
                <textarea id="pra-m" rows="2" placeholder="Cosa ha mangiato Massy?" oninput="salvaDato(this)"></textarea>
                <div class="quick-tags">
                    <button class="tag-btn" onclick="addTag('pra-m','🥩 Carne')">🥩 Carne</button>
                    <button class="tag-btn" onclick="addTag('pra-m','🐟 Pesce')">🐟 Pesce</button>
                    <button class="tag-btn" onclick="addTag('pra-m','🍝 Pasta')">🍝 Pasta</button>
                    <button class="tag-btn" onclick="addTag('pra-m','🥗 Insalata')">🥗 Mix</button>
                </div>
            </div>
            <div class="card l-border">
                <textarea id="pra-l" rows="2" placeholder="Cosa ha mangiato Lilly?" oninput="salvaDato(this)"></textarea>
                <div class="quick-tags">
                    <button class="tag-btn" onclick="addTag('pra-l','🥩 Carne')">🥩 Carne</button>
                    <button class="tag-btn" onclick="addTag('pra-l','🐟 Pesce')">🐟 Pesce</button>
                    <button class="tag-btn" onclick="addTag('pra-l','🍝 Pasta')">🍝 Pasta</button>
                    <button class="tag-btn" onclick="addTag('pra-l','🥗 Insalata')">🥗 Mix</button>
                </div>
            </div>

            <h4 style="margin:15px 0 5px; font-size:0.7rem; color:#888;">🥩 CENA</h4>
            <div class="card m-border">
                <textarea id="cen-m" rows="2" oninput="salvaDato(this)"></textarea>
                <div class="quick-tags">
                    <button class="tag-btn" onclick="addTag('cen-m','🍗 Pollo')">🍗 Pollo</button>
                    <button class="tag-btn" onclick="addTag('cen-m','🍣 Sushi')">🍣 Sushi</button>
                    <button class="tag-btn" onclick="addTag('cen-m','🍕 Pizza')">🍕 Pizza</button>
                    <button class="tag-btn" onclick="addTag('cen-m','🍲 Zuppa')">🍲 Zuppa</button>
                </div>
            </div>
            <div class="card l-border">
                <textarea id="cen-l" rows="2" oninput="salvaDato(this)"></textarea>
                <div class="quick-tags">
                    <button class="tag-btn" onclick="addTag('cen-l','🍗 Pollo')">🍗 Pollo</button>
                    <button class="tag-btn" onclick="addTag('cen-l','🍣 Sushi')">🍣 Sushi</button>
                    <button class="tag-btn" onclick="addTag('cen-l','🍕 Pizza')">🍕 Pizza</button>
                    <button class="tag-btn" onclick="addTag('cen-l','🍲 Zuppa')">🍲 Zuppa</button>
                </div>
            </div>
        </div>

        <div id="tab-wellness" class="tab-content">
            <h4 style="margin:5px 0; font-size:0.7rem; color:#888;">💧 IDRATAZIONE (Obiettivo 1.5L)</h4>
            <div id="card-water-m" class="water-card" style="margin-bottom:15px;">
                <div style="font-size:0.7rem; font-weight:bold; color:var(--massimo)">MASSIMO</div>
                <div class="drops-row" id="drops-m">
                    <span class="drop" onclick="setWater('m',1)">💧</span><span class="drop" onclick="setWater('m',2)">💧</span>
                    <span class="drop" onclick="setWater('m',3)">💧</span><span class="drop" onclick="setWater('m',4)">💧</span>
                    <span class="drop" onclick="setWater('m',5)">💧</span><span class="drop" onclick="setWater('m',6)">💧</span>
                    <span class="drop" onclick="setWater('m',7)">💧</span><span class="drop" onclick="setWater('m',8)">💧</span>
                </div>
                <div id="lab-water-m" class="water-label">0 Litri</div>
            </div>

            <div id="card-water-l" class="water-card">
                <div style="font-size:0.7rem; font-weight:bold; color:var(--liliana)">LILIANA</div>
                <div class="drops-row" id="drops-l">
                    <span class="drop" onclick="setWater('l',1)">💧</span><span class="drop" onclick="setWater('l',2)">💧</span>
                    <span class="drop" onclick="setWater('l',3)">💧</span><span class="drop" onclick="setWater('l',4)">💧</span>
                    <span class="drop" onclick="setWater('l',5)">💧</span><span class="drop" onclick="setWater('l',6)">💧</span>
                    <span class="drop" onclick="setWater('l',7)">💧</span><span class="drop" onclick="setWater('l',8)">💧</span>
                </div>
                <div id="lab-water-l" class="water-label">0 Litri</div>
            </div>
            
            <div style="text-align:center; font-size:0.6rem; color:#999; margin-top:10px;">
                * Ogni goccia equivale a un bicchiere da 250ml. 6 gocce = 1.5 Litri.
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataInizio = new Date();
    dataInizio.setDate(dataInizio.getDate() - (dataInizio.getDay() === 0 ? 6 : dataInizio.getDay() - 1));
    let curKey = "";
    let dataCorrenteVisualizzata = new Date();

    function openTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let dot = document.createElement('div');
            dot.className = `day-dot ${d.toDateString()==new Date().toDateString()?'today':''}`;
            dot.onclick = () => apriDettaglio(new Date(d));
            dot.innerHTML = `<span style="font-size:0.6rem; font-weight:bold; color:#999;">${d.toLocaleDateString('it-IT',{weekday:'short'}).toUpperCase()}</span><span style="font-size:1.4rem; font-weight:900;">${d.getDate()}</span>`;
            grid.appendChild(dot);
        }
        document.getElementById('week-label').innerText = dataInizio.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    }

    function apriDettaglio(data) {
        dataCorrenteVisualizzata = new Date(data);
        curKey = `${dataCorrenteVisualizzata.getFullYear()}-${dataCorrenteVisualizzata.getMonth()+1}-${dataCorrenteVisualizzata.getDate()}`;
        document.getElementById('modal-title').innerText = dataCorrenteVisualizzata.toLocaleDateString('it-IT', {weekday:'long', day:'numeric'});
        document.getElementById('modal').style.display = 'flex';

        db.ref("dailyData/" + curKey).once('value', snapshot => {
            const v = snapshot.val() || {};
            ['pra-m','pra-l','cen-m','cen-l'].forEach(id => document.getElementById(id).value = v[id] || "");
            updateWaterUI('m', v['water-m'] || 0);
            updateWaterUI('l', v['water-l'] || 0);
        });
    }

    function setWater(user, level) {
        db.ref("dailyData/" + curKey + "/water-" + user).set(level);
        updateWaterUI(user, level);
        statusUpdate();
    }

    function updateWaterUI(user, level) {
        const drops = document.getElementById('drops-' + user).children;
        for(let i=0; i<drops.length; i++) drops[i].classList.toggle('active', i < level);
        
        const litri = (level * 0.25).toFixed(1);
        const label = document.getElementById('lab-water-' + user);
        const card = document.getElementById('card-water-' + user);
        
        if(level >= 6) {
            label.innerHTML = `✅ ${litri} Litri - OBIETTIVO RAGGIUNTO!`;
            card.classList.add('goal-reached');
        } else {
            label.innerText = `${litri} Litri`;
            card.classList.remove('goal-reached');
        }
    }

    function addTag(id, text) {
        const el = document.getElementById(id);
        el.value = (el.value ? el.value + ", " : "") + text;
        salvaDato(el);
    }

    function salvaDato(el) { db.ref("dailyData/" + curKey + "/" + el.id).set(el.value); statusUpdate(); }
    function statusUpdate() { document.getElementById('sync-status').innerText = "☁️..."; setTimeout(()=>document.getElementById('sync-status').innerText="✅ SINCRO", 600); }
    function chiudi() { document.getElementById('modal').style.display = 'none'; }
    function cambiaSett(n) { dataInizio.setDate(dataInizio.getDate()+n); renderCalendar(); }

    window.onload = renderCalendar;
</script>
</body>
</html>
