<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Cloud Massimo & Liliana</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icona.png">
    <link rel="icon" type="image/png" href="icona.png">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #fdfdfd; --text: #2c3e50; --secondary: #546e7a; 
            --danger: #ef5350; --workout: #ba68c8; --warning: #ff9800; --shadow: 0 4px 12px rgba(0,0,0,0.06);
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .header { text-align: center; background: var(--primary); color: white; padding: 10px; box-shadow: var(--shadow); position: sticky; top:0; z-index:100; }
        .header h1 { font-size: 1.2rem; margin: 0; }
        #status { font-size: 0.7rem; font-weight: bold; opacity: 0.8; }
        
        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 10px; background: #fff; padding: 10px; border-bottom: 1px solid #eee; position: sticky; top: 48px; z-index: 99; }
        .btn-nav { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        #current-week-display { font-weight: bold; font-size: 0.9rem; text-align: center; flex: 1; color: var(--primary); }
        
        .main-wrapper { display: flex; flex-direction: column; gap: 15px; padding: 10px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        
        .day-card { background: white; border-radius: 16px; padding: 15px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .day-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; color: var(--primary); text-align: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; text-transform: uppercase; }
        
        .meal-box { margin-bottom: 18px; position: relative; }
        .meal-label { font-weight: bold; font-size: 0.85rem; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; background: var(--secondary); border-radius: 6px; padding: 5px 10px; width: fit-content; }
        .meal-label.workout { background: var(--workout) !important; }
        
        /* Alert Colesterolo */
        .health-alert { display: none; font-size: 0.7rem; color: var(--warning); font-weight: bold; position: absolute; right: 0; top: 5px; background: #fff3e0; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--warning); }
        
        .user-input-group { display: flex; flex-direction: column; gap: 10px; }
        .user-field { border-radius: 12px; padding: 10px; font-size: 1rem; border: 1px solid #ddd; resize: vertical; width: 100%; box-sizing: border-box; line-height: 1.4; transition: all 0.2s; }
        .user-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(38, 166, 154, 0.1); }
        
        .user-massimo { background-color: #e3f2fd; border-left: 5px solid #2196f3; }
        .user-liliana { background-color: #fce4ec; border-left: 5px solid #e91e63; }
        .user-tag { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; display: block; text-transform: uppercase; color: #555; }
        
        .dispensa-section { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .health-tips { background: #e8f5e9; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 0.85rem; border: 1px solid #c8e6c9; }
        .health-tips h4 { margin: 0 0 8px 0; color: #2e7d32; }

        .search-dispensa { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; font-size: 0.9rem; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { background: #e0f2f1; padding: 8px 14px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; border: 1px solid #b2dfdb; }
        
        .btn-clear { background: var(--danger); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }

        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; }
            .menu-section { flex: 4; }
            .dispensa-section { flex: 1; min-width: 300px; position: sticky; top: 120px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 Menu Cloud Massimo & Liliana</h1>
    <div id="status">Connessione...</div>
</div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-1)">◀ SETT.</button>
    <div id="current-week-display">Caricamento...</div>
    <button class="btn-nav" onclick="cambiaSettimana(1)">SUCC. ▶</button>
</div>

<div class="main-wrapper">
    <div class="menu-section">
        <div id="grid-container" class="grid"></div>
    </div>
    
    <div class="dispensa-section">
        <h3>🍎 Dispensa Rapida</h3>
        <div style="display:flex; gap:8px;">
            <input type="text" id="nuovoCibo" placeholder="Aggiungi..." style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
            <button onclick="aggiungiADispensa()" style="background:var(--primary); color:white; border:none; padding:0 15px; border-radius:10px; font-weight:bold;">+</button>
        </div>
        <input type="text" id="searchDispensa" class="search-dispensa" placeholder="🔍 Filtra cibi..." oninput="filtraDispensa()">
        <div id="listaDispensa" class="chip-container"></div>
        
        <div class="health-tips">
            <h4>💡 Pillole di Salute</h4>
            <ul style="margin:0; padding-left:18px;">
                <li>Usa <b>Olio EVO</b> a crudo.</li>
                <li>Preferisci <b>Cereali Integrali</b>.</li>
                <li>Limita <b>Grassi Saturi</b> (burro, carni rosse).</li>
                <li>Abbonda con le <b>Verdure</b>.</li>
            </ul>
        </div>

        <button onclick="svuotaSettimana()" class="btn-clear">🗑️ Svuota questa Settimana</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51",
        storageBucket: "miomenu-e2e51.firebasestorage.app",
        messagingSenderId: "996699369968",
        appId: "1:996699369968:web:0cbdd7de424b093355ed35"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dataCorrente = new Date();
    dataCorrente.setDate(dataCorrente.getDate() - (dataCorrente.getDay() === 0 ? 6 : dataCorrente.getDay() - 1));

    // LISTA CIBI DA MONITORARE PER IL COLESTEROLO
    const cibiOcchio = ["burro", "lardo", "pancetta", "salame", "salsiccia", "panna", "formaggio", "uova", "fritto", "maiale", "strutto", "pasticceria", "dolci", "biscotti", "carne rossa", "gamberi"];

    function checkHealth(id, text) {
        const parentBox = document.getElementById(id).closest('.meal-box');
        const alertBox = parentBox.querySelector('.health-alert');
        const trovato = cibiOcchio.some(cibo => text.toLowerCase().includes(cibo));
        alertBox.style.display = trovato ? "block" : "none";
    }

    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = "";
        const nomiGiorni = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
        const pasti = [{nome: "Colazione", icona: "☕"}, {nome: "Pranzo", icona: "🍝"}, {nome: "Cena", icona: "🥩"}, {nome: "Allenamento", icona: "💪"}];

        nomiGiorni.forEach((nomeGiorno, index) => {
            const dataGiorno = new Date(dataCorrente);
            dataGiorno.setDate(dataCorrente.getDate() + index);
            const giornoFormattato = dataGiorno.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' }).toUpperCase();

            const card = document.createElement('div');
            card.className = 'day-card';
            let html = `<div class="day-title">${nomeGiorno} ${giornoFormattato}</div>`;
            
            pasti.forEach(pasto => {
                const idBase = `${nomeGiorno}-${pasto.nome}`.toLowerCase().replace("ì", "i");
                html += `
                    <div class="meal-box">
                        <span class="health-alert">⚠️ Occhio ai Grassi</span>
                        <span class="${pasto.nome === 'Allenamento' ? 'meal-label workout' : 'meal-label'}">${pasto.icona} ${pasto.nome}</span>
                        <div class="user-input-group">
                            <div><span class="user-tag">♂ Massimo</span><textarea id="${idBase}-m" class="user-field user-massimo" rows="4" onfocus="window.lastFocusedId = this.id" oninput="autoSalvataggio(this)"></textarea></div>
                            <div><span class="user-tag">♀ Liliana</span><textarea id="${idBase}-l" class="user-field user-liliana" rows="4" onfocus="window.lastFocusedId = this.id" oninput="autoSalvataggio(this)"></textarea></div>
                        </div>
                    </div>`;
            });
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    function autoSalvataggio(el) {
        if(el) checkHealth(el.id, el.value);
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        clearTimeout(window.timeoutSalvataggio);
        window.timeoutSalvataggio = setTimeout(() => {
            const weekID = getIDSettimana(dataCorrente);
            const dati = {};
            document.querySelectorAll('textarea').forEach(t => dati[t.id] = t.value);
            db.ref('settimane/' + weekID).update(dati);
        }, 800);
    }

    function caricaDatiSettimana() {
        const weekID = getIDSettimana(dataCorrente);
        if(window.currentRef) window.currentRef.off();
        window.currentRef = db.ref('settimane/' + weekID);
        window.currentRef.on('value', (snap) => {
            const data = snap.val();
            document.querySelectorAll('textarea').forEach(t => { 
                if(document.activeElement !== t) {
                    t.value = data && data[t.id] ? data[t.id] : "";
                    checkHealth(t.id, t.value);
                }
            });
            document.getElementById('status').innerText = "✅ Sincronizzato";
        });
    }

    // [Funzioni Navigazione e Dispensa rimaste invariate]
    function getIDSettimana(d) { const lun = new Date(d); return lun.getFullYear() + "-" + (lun.getMonth() + 1).toString().padStart(2, '0') + "-" + lun.getDate().toString().padStart(2, '0'); }
    function aggiornaLabelSettimana() { const fineSett = new Date(dataCorrente); fineSett.setDate(fineSett.getDate() + 6); document.getElementById('current-week-display').innerText = "Settimana: " + dataCorrente.toLocaleDateString('it-IT') + " - " + fineSett.toLocaleDateString('it-IT'); }
    function cambiaSettimana(diff) { dataCorrente.setDate(dataCorrente.getDate() + (diff * 7)); aggiornaLabelSettimana(); creaGriglia(); caricaDatiSettimana(); }
    
    let tuttiICibi = [];
    db.ref('dispensa').on('value', snap => { tuttiICibi = snap.val() || []; aggiornaVisualizzazioneDispensa(tuttiICibi); });
    function aggiornaVisualizzazioneDispensa(lista) {
        const cont = document.getElementById('listaDispensa');
        cont.innerHTML = lista.map((c, i) => `<div class="chip"><span onclick="inserisci('${c.replace(/'/g, "\\'")}')">${c}</span><span style="margin-left:8px;color:red;font-weight:bold" onclick="rimuoviDaDispensa(${i})">×</span></div>`).join("");
    }
    function filtraDispensa() { const query = document.getElementById('searchDispensa').value.toLowerCase(); aggiornaVisualizzazioneDispensa(tuttiICibi.filter(c => c.toLowerCase().includes(query))); }
    function aggiungiADispensa() { const input = document.getElementById('nuovoCibo'); if (input.value.trim()) { db.ref('dispensa').once('value').then(snap => { let l = snap.val() || []; l.push(input.value.trim()); db.ref('dispensa').set(l); input.value = ""; }); } }
    function rimuoviDaDispensa(i) { if(confirm("Rimuovere dalla dispensa?")) { db.ref('dispensa').once('value').then(snap => { let l = snap.val() || []; l.splice(i, 1); db.ref('dispensa').set(l); }); } }
    function inserisci(t) { if(!window.lastFocusedId) return; const a = document.getElementById(window.lastFocusedId); a.value += (a.value ? ", " : "") + t; autoSalvataggio(a); }
    function svuotaSettimana() { if(confirm("Svuotare questa settimana?")) { db.ref('settimane/' + getIDSettimana(dataCorrente)).remove(); } }

    creaGriglia();
    aggiornaLabelSettimana();
    caricaDatiSettimana();
</script>
</body>
</html>
