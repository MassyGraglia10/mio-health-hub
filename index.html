<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M&L Smart Calendar</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #f8f9fa; --text: #2c3e50; --secondary: #546e7a; 
            --danger: #ef5350; --workout: #ba68c8; --weight: #ffa726; --spotify: #1DB954;
            --massimo: #2196f3; --liliana: #e91e63; --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .header { text-align: center; background: var(--primary); color: white; padding: 20px; box-shadow: var(--shadow); position: sticky; top:0; z-index:100; }
        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; background: white; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-nav { background: #eee; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        #current-week-display { font-weight: 800; color: var(--primary); font-size: 1.1rem; flex:1; text-align: center; }

        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; padding: 20px; max-width: 900px; margin: auto; }
        .day-dot { 
            background: white; border-radius: 25px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 2px solid transparent;
        }
        .day-dot:active { transform: scale(0.95); background: #f0f0f0; }
        .day-dot.today { border-color: var(--primary); background: #e0f2f1; }
        .day-dot .num { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
        .day-dot .name { font-size: 0.8rem; text-transform: uppercase; font-weight: bold; color: var(--secondary); }

        /* Modal / Popup */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1000; backdrop-filter: blur(8px); justify-content: center; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 600px; height: 85vh; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px; box-sizing: border-box; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; cursor: pointer; color: #ddd; line-height: 1; }

        .section-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: var(--secondary); margin: 25px 0 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* Liste Palestra */
        .gym-list { background: #f0f4f8; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .gym-row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .gym-time { font-weight: 900; color: var(--workout); }

        /* Peso */
        .weight-row { display: flex; gap: 15px; }
        .weight-box { flex: 1; background: #fff9f0; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #ffe0b2; }
        .weight-field { width: 90%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; text-align: center; font-weight: bold; font-size: 1.1rem; margin-top: 8px; }

        /* Pasti */
        .meal-card { background: #fff; border: 1px solid #eee; border-radius: 18px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        textarea { width: 100%; border: 1px solid #f0f0f0; border-radius: 12px; padding: 12px; margin-top: 10px; font-family: inherit; font-size: 1rem; box-sizing: border-box; background: #fafafa; }
        .area-m { border-left: 6px solid var(--massimo); }
        .area-l { border-left: 6px solid var(--liliana); }
        .user-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-top: 10px; display: block; }

        /* Musica */
        .music-box { background: #191414; color: white; padding: 15px; border-radius: 15px; margin-top: 10px; }
        .music-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .music-link { color: var(--spotify); text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 M&L Smart Planner</h1>
    <div id="status" style="font-size: 0.7rem; font-weight: bold;">Sincronizzato</div>
</div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-7)">◀</button>
    <div id="current-week-display">...</div>
    <button class="btn-nav" onclick="cambiaSettimana(7)">▶</button>
</div>

<div class="calendar-grid" id="calendar-grid"></div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="chiudiModal()">&times;</span>
        <h2 id="modal-date-title" style="color:var(--primary); margin:0 0 20px 0; font-size: 1.8rem;"></h2>
        
        <div class="section-title">⚖️ Monitoraggio Peso</div>
        <div class="weight-row">
            <div class="weight-box">
                <span class="user-label" style="color:var(--massimo)">Massimo</span>
                <input type="number" id="peso-m-input" class="weight-field" step="0.1" placeholder="0.0">
            </div>
            <div class="weight-box">
                <span class="user-label" style="color:var(--liliana)">Liliana</span>
                <input type="number" id="peso-l-input" class="weight-field" step="0.1" placeholder="0.0">
            </div>
        </div>

        <div class="section-title">🏋️ Corsi Club Adriano</div>
        <div class="gym-list" id="modal-gym-list"></div>

        <div class="section-title">🎵 Playlist del Giorno</div>
        <div class="music-box">
            <div id="modal-music-list"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="new-music-url" placeholder="Incolla link Spotify/YT..." style="flex:1; padding:8px; border-radius:8px; border:none;">
                <button onclick="aggiungiMusica()" style="background:var(--spotify); color:white; border:none; border-radius:8px; padding:0 15px; font-weight:bold;">+</button>
            </div>
        </div>

        <div class="section-title">🍴 Menu Giornaliero</div>
        <div id="modal-meals-container"></div>
        
        <div style="height: 50px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const orarioPalestra = {
        "Lunedì": [{c:"Tone Up (Beppe)",t:"09:00"}, {c:"Acqua Fit",t:"10:15"}, {c:"Power & Funct",t:"12:00"}, {c:"Aero Dance",t:"18:00"}, {c:"Spinning",t:"19:00"}, {c:"Fit Boxe",t:"20:00"}],
        "Martedì": [{c:"Gym Dance",t:"09:00"}, {c:"Tone Up",t:"10:00"}, {c:"Pilates",t:"11:00"}, {c:"Latin Moove",t:"14:00"}, {c:"TRX",t:"19:00"}, {c:"Walking Tone",t:"20:00"}],
        "Mercoledì": [{c:"Posturale",t:"09:00"}, {c:"Tonificazione",t:"10:00"}, {c:"Total Body",t:"12:00"}, {c:"Yoga",t:"15:00"}, {c:"Pump",t:"20:00"}],
        "Giovedì": [{c:"Tone Up",t:"09:00"}, {c:"Pilates",t:"10:00"}, {c:"Power Yoga",t:"13:00"}, {c:"Total Body",t:"18:00"}, {c:"Latin Moove",t:"19:00"}],
        "Venerdì": [{c:"G.A.G",t:"09:00"}, {c:"Circuit",t:"10:00"}, {c:"Spinning",t:"13:00"}, {c:"Fit Dance",t:"18:00"}, {c:"Tone Up Light",t:"20:00"}],
        "Sabato": [{c:"Yoga",t:"09:00"}, {c:"Tone Up",t:"10:00"}, {c:"Fit Dance",t:"12:00"}],
        "Domenica": [{c:"Sala Pesi Aperta",t:"10:00-13:00"}]
    };

    let dataInizioSettimana = new Date();
    dataInizioSettimana.setDate(dataInizioSettimana.getDate() - (dataInizioSettimana.getDay() === 0 ? 6 : dataInizioSettimana.getDay() - 1));
    let giornoAttivoInglese = ""; 

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = "";
        const fineSettimana = new Date(dataInizioSettimana);
        fineSettimana.setDate(dataInizioSettimana.getDate() + 6);
        document.getElementById('current-week-display').innerText = dataInizioSettimana.toLocaleDateString('it-IT', {day:'2-digit', month:'short'}) + " - " + fineSettimana.toLocaleDateString('it-IT', {day:'2-digit', month:'short'});

        for(let i=0; i<7; i++) {
            const d = new Date(dataInizioSettimana);
            d.setDate(dataInizioSettimana.getDate() + i);
            const dot = document.createElement('div');
            dot.className = `day-dot ${d.toDateString() === new Date().toDateString() ? 'today' : ''}`;
            dot.onclick = () => apriModal(new Date(d));
            dot.innerHTML = `<span class="name">${d.toLocaleDateString('it-IT', {weekday:'short'})}</span><span class="num">${d.getDate()}</span>`;
            grid.appendChild(dot);
        }
    }

    function apriModal(data) {
        const nomeGiorno = data.toLocaleDateString('it-IT', {weekday:'long'});
        const nomeGiornoPulito = nomeGiorno.charAt(0).toUpperCase() + nomeGiorno.slice(1).toLowerCase();
        const dayID = nomeGiornoPulito.toLowerCase().replace("ì", "i");
        const weekKey = getWeekKey(dataInizioSettimana);
        
        document.getElementById('modal-date-title').innerText = nomeGiornoPulito + " " + data.getDate();
        document.getElementById('modal-overlay').style.display = 'flex';

        // 1. Carica Corsi (Usa nomeGiornoPulito per match orarioPalestra)
        const corsi = orarioPalestra[nomeGiornoPulito] || [];
        document.getElementById('modal-gym-list').innerHTML = corsi.map(c => `<div class="gym-row"><span>${c.c}</span><span class="gym-time">${c.t}</span></div>`).join("") || "Nessun corso oggi";

        // 2. Genera HTML Pasti con ID fissi
        const pasti = [{id:"colazione",n:"Colazione",i:"☕"}, {id:"pranzo",n:"Pranzo",i:"🍝"}, {id:"cena",n:"Cena",i:"🥩"}, {id:"allenamento",n:"Allenamento",i:"💪"}];
        let mealsHtml = "";
        pasti.forEach(p => {
            const base = `${dayID}-${p.id}`;
            mealsHtml += `
                <div class="meal-card">
                    <div style="font-weight:bold; color:var(--secondary)">${p.i} ${p.n}</div>
                    <textarea id="${base}-m" class="area-m" placeholder="Massimo..." oninput="salva(this)"></textarea>
                    <textarea id="${base}-l" class="area-l" placeholder="Liliana..." oninput="salva(this)"></textarea>
                </div>`;
        });
        document.getElementById('modal-meals-container').innerHTML = mealsHtml;
        
        // 3. Collega campi peso
        const pM = document.getElementById('peso-m-input');
        const pL = document.getElementById('peso-l-input');
        pM.id = `${dayID}-peso-m`; pM.oninput = function() { salva(this); };
        pL.id = `${dayID}-peso-l`; pL.oninput = function() { salva(this); };

        // 4. RECUPERO DATI REALE DA FIREBASE
        db.ref('settimane/' + weekKey).once('value', s => {
            const dataSaved = s.val() || {};
            // Troviamo tutti gli input e textarea del modal e popoliamoli
            document.querySelectorAll('.modal-content textarea, .modal-content input[type="number"]').forEach(field => {
                field.value = dataSaved[field.id] || "";
            });
        });

        caricaMusica();
    }

    function salva(el) {
        const weekKey = getWeekKey(dataInizioSettimana);
        db.ref('settimane/' + weekKey).child(el.id).set(el.value);
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        setTimeout(() => document.getElementById('status').innerText = "✅ Sincronizzato", 800);
    }

    function caricaMusica() {
        db.ref('musica').once('value', s => {
            const list = s.val() || {};
            document.getElementById('modal-music-list').innerHTML = Object.keys(list).map(id => `
                <div class="music-item">
                    <a href="${list[id]}" target="_blank" class="music-link">🔗 Vai alla Playlist</a>
                    <span style="color:red; cursor:pointer; font-weight:bold; padding:5px;" onclick="eliminaMusica('${id}')">×</span>
                </div>
            `).join("") || "Nessun link salvato";
        });
    }

    function aggiungiMusica() {
        const url = document.getElementById('new-music-url');
        if(url.value) { db.ref('musica').push(url.value); url.value = ""; caricaMusica(); }
    }

    function eliminaMusica(id) { db.ref('musica/' + id).remove(); caricaMusica(); }
    function chiudiModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function cambiaSettimana(g) { dataInizioSettimana.setDate(dataInizioSettimana.getDate() + g); renderCalendar(); }
    function getWeekKey(d) { return d.getFullYear() + "-" + (d.getMonth() + 1).toString().padStart(2, '0') + "-" + d.getDate().toString().padStart(2, '0'); }

    window.onload = renderCalendar;
</script>
</body>
</html>
