<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Adriano - M&L Smart Menu</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #f4f7f6; --text: #2c3e50; --secondary: #546e7a; 
            --danger: #ef5350; --workout: #ba68c8; --weight: #ffa726; --spotify: #1DB954; 
            --massimo: #2196f3; --liliana: #e91e63; --shadow: 0 4px 15px rgba(0,0,0,0.08);
            --gym-bg: #f0f4f8;
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .header { text-align: center; background: var(--primary); color: white; padding: 15px; box-shadow: var(--shadow); position: sticky; top:0; z-index:100; }
        .header h1 { font-size: 1.2rem; margin: 0; }

        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 10px; background: #fff; padding: 12px; border-bottom: 1px solid #eee; position: sticky; top: 48px; z-index: 99; }
        .btn-nav { background: var(--secondary); color: white; border: none; padding: 10px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #current-week-display { font-weight: bold; color: var(--primary); flex: 1; text-align: center; }

        .main-wrapper { display: flex; flex-direction: column; gap: 20px; padding: 15px; max-width: 1600px; margin: auto; }
        
        @media (min-width: 1100px) { .content-layout { display: grid; grid-template-columns: 4fr 1fr; gap: 20px; } }

        /* Card Menu */
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .day-card { background: white; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); border-top: 6px solid var(--primary); }
        .day-title { font-weight: 900; font-size: 1.2rem; margin-bottom: 15px; color: var(--primary); text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; text-transform: uppercase; }
        
        /* Sezione Corsi dentro la Card */
        .day-gym-box { background: var(--gym-bg); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #d1d9e6; }
        .day-gym-title { font-size: 0.75rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; margin-bottom: 8px; display: block; text-align: center; }
        .gym-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .gym-row:last-child { border: none; }
        .gym-time { font-weight: bold; color: var(--workout); min-width: 50px; }

        /* Sezione Peso */
        .weight-section { display: flex; gap: 10px; background: #fff9f0; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ffe0b2; }
        .weight-input { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .weight-field { width: 90%; border: 1px solid #ccc; border-radius: 8px; padding: 6px; text-align: center; font-weight: bold; font-size: 1rem; }
        .user-tag-small { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }

        /* Pasti */
        .meal-box { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .meal-header { font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; color: var(--secondary); }
        .meal-header.workout { color: var(--workout); }

        .user-field { border-radius: 10px; padding: 10px; font-size: 0.95rem; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-top: 5px; }
        .field-m { border-left: 5px solid var(--massimo); }
        .field-l { border-left: 5px solid var(--liliana); }
        .name-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-top: 8px; display: block; }

        /* Musica Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .side-card { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); }
        .music-item { background: #333; color: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .music-item a { color: var(--spotify); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>🏋️ Club Adriano: M&L Smart Menu</h1>
    <div id="status" style="font-size: 0.7rem; opacity: 0.8;">Sincronizzazione...</div>
</div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-1)">◀</button>
    <div id="current-week-display">...</div>
    <button class="btn-nav" onclick="cambiaSettimana(1)">▶</button>
</div>

<div class="main-wrapper">
    <div class="content-layout">
        <div id="grid-container" class="grid-menu"></div>

        <div class="sidebar">
            <div class="side-card" style="background: #191414; color: white;">
                <h3 style="color: var(--spotify); margin-top:0">🎵 Musica</h3>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="musicUrl" placeholder="Link playlist..." style="flex:1; padding:8px; border-radius:5px; border:none;">
                    <button onclick="aggiungiMusica()" style="background:var(--spotify); color:white; border:none; padding:8px; border-radius:5px; font-weight:bold;">+</button>
                </div>
                <div id="music-list"></div>
            </div>
            <button onclick="svuotaSettimana()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:15px; width:100%; font-weight:bold; cursor:pointer;">🗑️ Reset Settimana</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51",
        storageBucket: "miomenu-e2e51.firebasestorage.app",
        messagingSenderId: "996699369968",
        appId: "1:996699369968:web:0cbdd7de424b093355ed35"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const orarioPalestra = {
        "Lunedì": [
            {c: "Tone Up (Beppe)", t: "09:00"}, {c: "Acqua Fit (Francy)", t: "10:15"},
            {c: "Power & Funct (Giorgio)", t: "12:00"}, {c: "Acqua Gym (Franci)", t: "12:00"},
            {c: "Fat Burns (Giorgio)", t: "13:00"}, {c: "Acqua Bike (Franci)", t: "13:00"},
            {c: "Body Fit (Gianni)", t: "16:00"}, {c: "Pilates (Duilio)", t: "17:00"},
            {c: "Aero Dance (Nicola)", t: "18:00"}, {c: "Acqua Gym (Francy)", t: "18:00"},
            {c: "Tone Up (Nicola)", t: "19:00"}, {c: "Spinning (Marco)", t: "19:00"},
            {c: "Fit Boxe (Sarah)", t: "20:00"}, {c: "Yoga (Sarah)", t: "21:00"}
        ],
        "Martedì": [
            {c: "Gym Dance (Giuseppe)", t: "09:00"}, {c: "Tone Up (Duilio)", t: "10:00"},
            {c: "Pilates (Duilio)", t: "11:00"}, {c: "Aero Dance (Nicola)", t: "12:00"},
            {c: "Tone Up (Nicola)", t: "13:00"}, {c: "Acqua Tone (Fabio)", t: "13:00"},
            {c: "Latin Moove (Osvaldo)", t: "14:00"}, {c: "Acqua Bike (Fabio)", t: "16:00"},
            {c: "Pilates (Manuela)", t: "17:00"}, {c: "Tone Up (Manuela)", t: "18:00"},
            {c: "Acqua Bike (Fabio)", t: "18:15"}, {c: "TRX (Edoardo)", t: "19:00"},
            {c: "Acqua Gym (Manuela)", t: "19:15"}, {c: "Walking Tone (Duilio)", t: "20:00"}
        ],
        "Mercoledì": [
            {c: "Posturale (Roby)", t: "09:00"}, {c: "Tonificazione (Roby)", t: "10:00"},
            {c: "Acqua Strong (Francy)", t: "10:15"}, {c: "Total Body (Franklin)", t: "12:00"},
            {c: "Acqua Gym (Simo)", t: "12:00"}, {c: "Total Body (Simone L.)", t: "13:00"},
            {c: "Acqua Bike (Simo)", t: "13:00"}, {c: "Yoga (Riccardo)", t: "15:00"},
            {c: "Tone Up (Gianni)", t: "16:00"}, {c: "Body Sculp. (Duilio)", t: "17:00"},
            {c: "Mobility (Simona)", t: "18:00"}, {c: "Tone Up (Nicola)", t: "19:00"},
            {c: "Acqua Circuit (Gio)", t: "19:30"}, {c: "Pump (Nicola)", t: "20:00"}
        ],
        "Giovedì": [
            {c: "Tone Up (Duilio)", t: "09:00"}, {c: "Pilates (Giuseppe)", t: "10:00"},
            {c: "Tone Up (Giuseppe)", t: "11:00"}, {c: "Aero Dance (Nicola)", t: "12:00"},
            {c: "Power Yoga (Domenico)", t: "13:00"}, {c: "Fit Boxe (Gianca)", t: "13:30"},
            {c: "Acqua Gym (Giulia)", t: "13:00"}, {c: "Pilates (Manuela)", t: "17:00"},
            {c: "Total Body (Manuela)", t: "18:00"}, {c: "Acqua Bike (Fabio)", t: "18:15"},
            {c: "Latin Moove (Osvaldo)", t: "19:00"}, {c: "Acqua Gym (Manuela)", t: "19:15"},
            {c: "Body Condit (Beppe)", t: "20:00"}
        ],
        "Venerdì": [
            {c: "G.A.G (Simo)", t: "09:00"}, {c: "Circuit Train (Simo)", t: "10:00"},
            {c: "Acqua Fit (Francy)", t: "10:15"}, {c: "Total Body (Franklin)", t: "12:00"},
            {c: "Latin Moove (Osvaldo)", t: "13:00"}, {c: "Acqua Gym (Francy)", t: "13:00"},
            {c: "Spinning (Michela)", t: "13:00"}, {c: "Yoga (Riccardo)", t: "17:00"},
            {c: "Fit Dance (Stefano)", t: "18:00"}, {c: "Tone Up (Simone)", t: "19:00"},
            {c: "Acqua Gym (Nicola)", t: "19:00"}, {c: "Tone Up Light (Beppe)", t: "20:00"}
        ],
        "Sabato": [
            {c: "Yoga (Giancarlo)", t: "09:00"}, {c: "Tone Up (Dario)", t: "10:00"},
            {c: "Mobility (Simona)", t: "11:00"}, {c: "Acqua Gym (Piky)", t: "11:00"},
            {c: "Fit Dance (Stefano)", t: "12:00"}, {c: "Latin Moove (Osvaldo)", t: "13:00"}
        ],
        "Domenica": [{c: "Sala Pesi Aperta", t: "10:00-13:00"}]
    };

    let dataCorrente = new Date();
    dataCorrente.setDate(dataCorrente.getDate() - (dataCorrente.getDay() === 0 ? 6 : dataCorrente.getDay() - 1));

    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = "";
        const giorni = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
        const pasti = [{id:"colazione",n:"Colazione",i:"☕"}, {id:"pranzo",n:"Pranzo",i:"🍝"}, {id:"cena",n:"Cena",i:"🥩"}, {id:"allenamento",n:"Allenamento",i:"💪"}];
        
        giorni.forEach((g, idx) => {
            const dG = new Date(dataCorrente); dG.setDate(dataCorrente.getDate() + idx);
            const baseIdDay = g.toLowerCase().replace("ì", "i");
            const card = document.createElement('div');
            card.className = 'day-card';
            
            // Genera lista corsi per questo giorno
            const corsiOggi = orarioPalestra[g] || [];
            let corsiHtml = corsiOggi.map(c => `
                <div class="gym-row">
                    <span>${c.c}</span>
                    <span class="gym-time">${c.t}</span>
                </div>
            `).join("");

            let html = `
                <div class="day-title">${g} ${dG.getDate()}/${dG.getMonth()+1}</div>
                
                <div class="day-gym-box">
                    <span class="day-gym-title">🏋️ Corsi Club Adriano</span>
                    ${corsiHtml || '<div style="font-size:0.8rem; text-align:center;">Nessun corso</div>'}
                </div>

                <div class="weight-section">
                    <div class="weight-input">
                        <span class="user-tag-small" style="color:var(--massimo)">Massimo (kg)</span>
                        <input type="number" id="${baseIdDay}-peso-m" class="weight-field" step="0.1" oninput="salvaDato(this)">
                    </div>
                    <div class="weight-input">
                        <span class="user-tag-small" style="color:var(--liliana)">Liliana (kg)</span>
                        <input type="number" id="${baseIdDay}-peso-l" class="weight-field" step="0.1" oninput="salvaDato(this)">
                    </div>
                </div>
            `;
            
            pasti.forEach(p => {
                const baseId = `${g}-${p.id}`.toLowerCase().replace("ì", "i");
                html += `
                <div class="meal-box">
                    <div class="meal-header ${p.id==='allenamento'?'workout':''}"> ${p.i} ${p.n}</div>
                    <span class="name-label" style="color:var(--massimo)">Massimo</span>
                    <textarea id="${baseId}-m" class="user-field field-m" rows="2" oninput="salvaDato(this)"></textarea>
                    <span class="name-label" style="color:var(--liliana)">Liliana</span>
                    <textarea id="${baseId}-l" class="user-field field-l" rows="2" oninput="salvaDato(this)"></textarea>
                </div>`;
            });
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    function salvaDato(el) {
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        const weekID = getIDSettimana(dataCorrente);
        db.ref('settimane/' + weekID).child(el.id).set(el.value);
    }

    function caricaDati() {
        const weekID = getIDSettimana(dataCorrente);
        db.ref('settimane/' + weekID).on('value', (s) => {
            const dat = s.val() || {};
            document.querySelectorAll('textarea, .weight-field').forEach(t => { 
                if(document.activeElement !== t) t.value = dat[t.id] || ""; 
            });
            document.getElementById('status').innerText = "✅ Sincronizzato";
        });
    }

    function aggiungiMusica() {
        const input = document.getElementById('musicUrl');
        if (input.value.trim()) { db.ref('musica').push(input.value.trim()); input.value = ""; }
    }

    db.ref('musica').on('value', s => {
        const list = s.val() || {};
        const container = document.getElementById('music-list');
        container.innerHTML = Object.keys(list).map(id => `
            <div class="music-item">
                <a href="${list[id]}" target="_blank">🎵 Link Music</a>
                <span style="color:red; cursor:pointer; font-weight:bold" onclick="db.ref('musica/${id}').remove()">×</span>
            </div>
        `).join("");
    });

    function getIDSettimana(d) { const l = new Date(d); return l.getFullYear() + "-" + (l.getMonth() + 1).toString().padStart(2, '0') + "-" + l.getDate().toString().padStart(2, '0'); }
    function aggiornaLabelSettimana() { const fS = new Date(dataCorrente); fS.setDate(fS.getDate() + 6); document.getElementById('current-week-display').innerText = dataCorrente.toLocaleDateString('it-IT') + " - " + fS.toLocaleDateString('it-IT'); }
    function cambiaSettimana(diff) { dataCorrente.setDate(dataCorrente.getDate() + (diff * 7)); aggiornaLabelSettimana(); creaGriglia(); caricaDati(); }
    function svuotaSettimana() { if(confirm("Resettare tutta la settimana?")) { db.ref('settimane/' + getIDSettimana(dataCorrente)).remove(); } }

    window.onload = () => { creaGriglia(); aggiornaLabelSettimana(); caricaDati(); };
</script>
</body>
</html>
