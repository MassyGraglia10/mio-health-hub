<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Cloud Massimo & Liliana</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #fdfdfd; --text: #2c3e50; --secondary: #546e7a; 
            --danger: #ef5350; --workout: #ba68c8; --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --yoga: #8e44ad; --pilates: #2980b9; --mind: #16a085;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        .header { text-align: center; background: var(--primary); color: white; padding: 10px; position: sticky; top:0; z-index:100; }
        .nav-weeks { display: flex; justify-content: center; align-items: center; gap: 10px; background: #fff; padding: 10px; border-bottom: 1px solid #eee; position: sticky; top: 48px; z-index: 99; }
        .btn-nav { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .main-wrapper { display: flex; flex-direction: column; gap: 15px; padding: 10px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .day-card { background: white; border-radius: 16px; padding: 15px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; }
        .day-title { font-weight: 800; color: var(--primary); text-align: center; text-transform: uppercase; margin-bottom: 15px; }
        .meal-box { margin-bottom: 20px; }
        .meal-label { font-weight: bold; font-size: 0.85rem; color: #fff; background: var(--secondary); border-radius: 6px; padding: 5px 10px; width: fit-content; display: flex; align-items: center; gap: 6px; }
        .meal-label.workout { background: var(--workout) !important; }
        .user-field { border-radius: 12px; padding: 10px; font-size: 0.95rem; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-top: 5px; }
        .user-massimo { border-left: 5px solid #2196f3; }
        .user-liliana { border-left: 5px solid #e91e63; }
        .btn-workout-link { display: block; flex: 1; padding: 15px; border-radius: 12px; font-weight: bold; text-decoration: none; text-align: center; color: white; text-transform: uppercase; }
        @media (min-width: 1024px) { .main-wrapper { flex-direction: row; } .menu-section { flex: 4; } .dispensa-section { flex: 1; position: sticky; top: 120px; } }
    </style>
</head>
<body>

<div class="header"><h1>🍱 Menu Cloud Max & Lili</h1><div id="status" style="font-size:0.7rem;">Connessione...</div></div>

<div class="nav-weeks">
    <button class="btn-nav" onclick="cambiaSettimana(-1)">◀ SETT.</button>
    <div id="current-week-display" style="font-weight:bold; color:var(--primary);">...</div>
    <button class="btn-nav" onclick="cambiaSettimana(1)">SUCC. ▶</button>
</div>

<div class="main-wrapper">
    <div class="menu-section">
        <div id="grid-container" class="grid"></div>
        <div class="workout-footer" style="background:#f8f9fa; padding:20px; border-radius:20px; margin-top:20px; border:1px solid #dee2e6;">
            <h3 style="color: var(--primary); margin-top:0;">🏋️ Area Allenamento</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <a href="palestra.html?user=max" class="btn-workout-link" style="background:#2196f3;">♂ Scheda Massimo</a>
                <a href="palestra.html?user=lili" class="btn-workout-link" style="background:#e91e63;">♀ Scheda Liliana</a>
            </div>
        </div>
    </div>
    <div class="dispensa-section">
        <h3>🍎 Dispensa Rapida</h3>
        <input type="text" id="nuovoCibo" placeholder="Aggiungi..." style="width:70%; padding:10px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="aggiungiADispensa()" style="padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">+</button>
        <div id="listaDispensa" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
        <button onclick="svuotaSettimana()" style="background:var(--danger); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; cursor:pointer; margin-top:30px;">🗑️ Svuota Settimana</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc", authDomain: "miomenu-e2e51.firebaseapp.com", databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", projectId: "miomenu-e2e51" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dataCorrente = new Date();
    dataCorrente.setDate(dataCorrente.getDate() - (dataCorrente.getDay() === 0 ? 6 : dataCorrente.getDay() - 1));

    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = "";
        const giorni = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
        const pasti = [{n: "Colazione", i: "☕"}, {n: "Pranzo", i: "🍝"}, {n: "Cena", i: "🥩"}, {n: "Allenamento", i: "💪"}];
        giorni.forEach((g, idx) => {
            const dG = new Date(dataCorrente); dG.setDate(dataCorrente.getDate() + idx);
            const card = document.createElement('div'); card.className = 'day-card';
            let h = `<div class="day-title">${g} ${dG.getDate()}/${dG.getMonth()+1}</div>`;
            pasti.forEach(p => {
                const id = `${g}-${p.n}`.toLowerCase().replace("ì", "i");
                h += `<div class="meal-box"><span class="${p.n==='Allenamento'?'meal-label workout':'meal-label'}">${p.i} ${p.n}</span>
                <textarea id="${id}-m" class="user-field user-massimo" rows="2" placeholder="Max..." onfocus="window.lastFocusedId=this.id" oninput="aggiornaTutto()"></textarea>
                <textarea id="${id}-l" class="user-field user-liliana" rows="2" placeholder="Lili..." onfocus="window.lastFocusedId=this.id" oninput="aggiornaTutto()"></textarea></div>`;
            });
            card.innerHTML = h; container.appendChild(card);
        });
    }

    function aggiornaTutto() {
        document.getElementById('status').innerText = "☁️ Salvataggio...";
        const data = {}; document.querySelectorAll('textarea').forEach(t => data[t.id] = t.value);
        db.ref('settimane/' + getIDSettimana(dataCorrente)).update(data).then(() => document.getElementById('status').innerText = "✅ Sincronizzato");
    }

    function caricaDatiSettimana() {
        db.ref('settimane/' + getIDSettimana(dataCorrente)).on('value', (s) => {
            const dat = s.val() || {};
            document.querySelectorAll('textarea').forEach(t => { if(document.activeElement !== t) t.value = dat[t.id] || ""; });
        });
    }

    function getIDSettimana(d) { return d.getFullYear() + "-" + (d.getMonth() + 1).toString().padStart(2, '0') + "-" + d.getDate().toString().padStart(2, '0'); }
    function cambiaSettimana(diff) { dataCorrente.setDate(dataCorrente.getDate() + (diff * 7)); creaGriglia(); caricaDatiSettimana(); aggiornaLabel(); }
    function aggiornaLabel() { const fS = new Date(dataCorrente); fS.setDate(fS.getDate() + 6); document.getElementById('current-week-display').innerText = dataCorrente.toLocaleDateString() + " - " + fS.toLocaleDateString(); }
    function svuotaSettimana() { if(confirm("Svuotare?")) db.ref('settimane/' + getIDSettimana(dataCorrente)).remove(); }

    window.onload = () => { creaGriglia(); caricaDatiSettimana(); aggiornaLabel(); };
</script>
</body>
</html>
