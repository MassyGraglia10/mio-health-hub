<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Massy e Lilly v36</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #26a69a; --bg: #f4f7f6; --text: #2c3e50; 
            --massimo: #2196f3; --liliana: #e91e63;
            --relax: #9c27b0; --spotify: #1DB954;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .header { text-align: center; background: var(--primary); color: white; padding: 12px; position: sticky; top:0; z-index:100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; border-bottom: 1px solid #eee; }
        .btn-nav { background: #eee; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; color: var(--text); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; padding: 12px; max-width: 900px; margin: auto; }
        .day-dot { background: white; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .day-dot.today { border: 2px solid var(--primary); background: #e0f2f1; }
        .day-dot .num { font-size: 1.4rem; font-weight: 900; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-width: 600px; height: 95vh; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-bar { display: flex; background: #f0f0f0; margin: 10px 15px; border-radius: 12px; padding: 4px; flex-shrink: 0; overflow-x: auto; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; cursor: pointer; background: transparent; color: #777; white-space: nowrap; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .tab-content { flex-grow: 1; overflow-y: auto; padding: 15px; display: none; box-sizing: border-box; }
        .tab-content.active { display: block; }

        .time-header { background: #eceff1; color: #546e7a; font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 15px; display: inline-block; margin: 15px 0 5px; text-transform: uppercase; }
        .card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 12px; margin-bottom: 12px; }
        .m-border { border-left: 5px solid var(--massimo); } .l-border { border-left: 5px solid var(--liliana); }
        .user-title { font-size: 0.7rem; font-weight: 900; margin-bottom: 5px; }
        
        textarea, input[type="text"], input[type="number"] { width: 100%; border: 1px solid #f0f0f0; border-radius: 8px; padding: 10px; font-size: 0.95rem; background: #fafafa; box-sizing: border-box; resize: none; }
        .btn-view { border: none; padding: 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer; display: block; width: 100%; margin-top: 8px; color: white; text-align: center; text-decoration: none; }
        .btn-spotify { background: var(--spotify); margin-bottom: 8px; }
        
        /* Stile Lista Spesa */
        .spesa-container { background: #fffbe6; border: 2px dashed #ffe58f; border-radius: 15px; padding: 15px; margin-top: 10px; display: none; }
        .spesa-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid #fff1b8; font-size: 0.9rem; text-transform: capitalize; }
        
        #img-viewer { position: fixed; inset: 0; background: black; z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size: 1.1rem;">🍱 Massy e Lilly</h2>
    <div id="sync-status" style="font-size: 0.55rem; font-weight: bold;">✅ SINCRO ATTIVA</div>
</div>

<div class="nav-bar">
    <button class="btn-nav" onclick="cambiaSett(-7)">◀</button>
    <div id="week-label" style="font-weight:bold; color:var(--primary);">...</div>
    <button class="btn-nav" onclick="cambiaSett(7)">▶</button>
</div>

<div class="calendar-grid" id="grid"></div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div style="padding: 15px 20px 0;">
            <span style="float:right; font-size:1.5rem; color:#ccc; cursor:pointer" onclick="chiudi()">×</span>
            <h2 id="modal-title" style="margin:0; color:var(--primary); font-size: 1.2rem;"></h2>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="openTab(event, 'tab-menu')">🍴 MENÙ</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-gym')">🏋️ GYM</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-relax')">🧘 RELAX</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-report')">📊 REPORT</button>
        </div>

        <div id="tab-menu" class="tab-content active">
            <button class="btn-view" style="background:#ff9800; margin-bottom:15px;" onclick="generaSpesa()">🛒 GENERA LISTA SPESA SETTIMANALE</button>
            
            <div id="box-spesa" class="spesa-container">
                <h3 style="margin:0 0 10px 0; font-size:0.9rem;">🍏 COSA COMPRARE QUESTA SETTIMANA:</h3>
                <div id="lista-spesa-corpo"></div>
            </div>

            <div class="time-header">☕ COLAZIONE</div>
            <div class="card m-border"><div class="user-title" style="color:var(--massimo)">MASSIMO</div><textarea id="col-m" rows="3" oninput="salvaDato(this)"></textarea></div>
            <div class="card l-border"><div class="user-title" style="color:var(--liliana)">LILIANA</div><textarea id="col-l" rows="3" oninput="salvaDato(this)"></textarea></div>
            <div class="time-header">🥗 PRANZO</div>
            <div class="card m-border"><div class="user-title" style="color:var(--massimo)">MASSIMO</div><textarea id="pra-m" rows="3" oninput="salvaDato(this)"></textarea></div>
            <div class="card l-border"><div class="user-title" style="color:var(--liliana)">LILIANA</div><textarea id="pra-l" rows="3" oninput="salvaDato(this)"></textarea></div>
            <div class="time-header">🥩 CENA</div>
            <div class="card m-border"><div class="user-title" style="color:var(--massimo)">MASSIMO</div><textarea id="cen-m" rows="3" oninput="salvaDato(this)"></textarea></div>
            <div class="card l-border"><div class="user-title" style="color:var(--liliana)">LILIANA</div><textarea id="cen-l" rows="3" oninput="salvaDato(this)"></textarea></div>
        </div>

        <div id="tab-gym" class="tab-content">
            <div class="time-header">🏋️ SALA PESI</div>
            <div class="card m-border"><label style="font-weight:bold; font-size:0.75rem;"><input type="checkbox" id="check-pesi-m" onchange="salvaCheckV3(this)"> SALA PESI MASSIMO</label></div>
            <div class="card l-border"><label style="font-weight:bold; font-size:0.75rem;"><input type="checkbox" id="check-pesi-l" onchange="salvaCheckV3(this)"> SALA PESI LILIANA</label></div>
            <div id="gym-list-m" class="card m-border"></div>
            <div id="gym-list-l" class="card l-border"></div>
        </div>

        <div id="tab-relax" class="tab-content">
            <div class="time-header">🎵 PLAYLIST SPOTIFY</div>
            <div class="card m-border">
                <input type="text" id="play-m" placeholder="Link Spotify Massy..." oninput="salvaDato(this)">
                <button class="btn-view btn-spotify" onclick="window.open(document.getElementById('play-m').value || 'https://open.spotify.com','_blank')">🎧 APRI SPOTIFY MASSY</button>
            </div>
            <div class="card l-border">
                <input type="text" id="play-l" value="https://open.spotify.com/playlist/3wG8xjrf5opSS6ONz8yCv4?si=zHUOKzBqTPO4E-QUegF-Tg" oninput="salvaDato(this)">
                <button class="btn-view btn-spotify" onclick="window.open(document.getElementById('play-l').value || 'https://open.spotify.com/playlist/3wG8xjrf5opSS6ONz8yCv4?si=zHUOKzBqTPO4E-QUegF-Tg','_blank')">🎧 APRI SPOTIFY LILLY</button>
            </div>
        </div>

        <div id="tab-report" class="tab-content">
            <div class="time-header">⚖️ DATI FISICI</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="card m-border">Peso M<input type="number" id="peso-m" step="0.1" oninput="salvaDato(this)"></div>
                <div class="card l-border">Peso L<input type="number" id="peso-l" step="0.1" oninput="salvaDato(this)"></div>
            </div>
            <div id="bmi-display" class="card" style="text-align:center; font-size:0.8rem;">...</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS01EENxcYst32-dxZkSQ6febvYZnBtNc",
        authDomain: "miomenu-e2e51.firebaseapp.com",
        databaseURL: "https://miomenu-e2e51-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "miomenu-e2e51"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataInizio = new Date();
    dataInizio.setDate(dataInizio.getDate() - (dataInizio.getDay() === 0 ? 6 : dataInizio.getDay() - 1));
    let curKey = "";

    // Funzione Intelligente Lista Spesa
    async function generaSpesa() {
        const box = document.getElementById('box-spesa');
        const corpo = document.getElementById('lista-spesa-corpo');
        box.style.display = 'block';
        corpo.innerHTML = "Analisi menù in corso...";

        let ingredientiRaw = [];
        const stopWords = ["olio", "sale", "pepe", "caffe", "caffè", "zucchero", "acqua", "e", "con", "di", "per", "un", "una", "a", "in"];

        // Recuperiamo tutti i dati della settimana corrente
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let k = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
            const snap = await db.ref("dailyData/" + k).once('value');
            const v = snap.val() || {};
            
            // Uniamo i testi di pranzo e cena di entrambi
            const testoGiorno = `${v['pra-m']||''} ${v['pra-l']||''} ${v['cen-m']||''} ${v['cen-l']||''}`;
            // Pulizia base: togliamo virgole e andiamo a capo, rendiamo minuscolo
            const parole = testoGiorno.toLowerCase().replace(/[,.\n]/g, " ").split(" ");
            ingredientiRaw.push(...parole);
        }

        // Pulizia Intelligente
        let listaPulita = ingredientiRaw
            .map(p => p.trim())
            .filter(p => p.length > 2) // via parole troppo corte
            .filter(p => !stopWords.includes(p)) // via olio, sale, etc.
            .filter(p => isNaN(p)); // via numeri (grammi, etc)

        // Rimuovi Duplicati
        let setSpesa = [...new Set(listaPulita)];

        if(setSpesa.length === 0) {
            corpo.innerHTML = "Nessun ingrediente trovato nei menù della settimana.";
        } else {
            corpo.innerHTML = setSpesa.map(item => `
                <div class="spesa-item">
                    <input type="checkbox"> <span>${item}</span>
                </div>
            `).join("");
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        for(let i=0; i<7; i++){
            let d = new Date(dataInizio); d.setDate(dataInizio.getDate()+i);
            let dot = document.createElement('div');
            dot.className = `day-dot ${d.toDateString()==new Date().toDateString()?'today':''}`;
            dot.onclick = () => apriDettaglio(new Date(d));
            dot.innerHTML = `<span style="font-size:0.6rem; color:#999; font-weight:bold;">${d.toLocaleDateString('it-IT',{weekday:'short'}).toUpperCase()}</span><span class="num">${d.getDate()}</span>`;
            grid.appendChild(dot);
        }
        document.getElementById('week-label').innerText = dataInizio.toLocaleDateString('it-IT',{day:'numeric',month:'short'}) + " - " + new Date(new Date(dataInizio).setDate(dataInizio.getDate()+6)).toLocaleDateString('it-IT',{day:'numeric',month:'short'});
    }

    function apriDettaglio(data) {
        curKey = `${data.getFullYear()}-${data.getMonth()+1}-${data.getDate()}`;
        document.getElementById('modal-title').innerText = data.toLocaleDateString('it-IT', {weekday:'long', day:'numeric'});
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('box-spesa').style.display = 'none'; // Nascondi spesa all'apertura giorno

        db.ref("dailyData/" + curKey).once('value', snapshot => {
            const v = snapshot.val() || {};
            const fields = ['peso-m','peso-l','col-m','col-l','pra-m','pra-l','cen-m','cen-l','play-m','play-l'];
            fields.forEach(id => { 
                if(document.getElementById(id)) {
                    if(id === 'play-l' && !v[id]) document.getElementById(id).value = "https://open.spotify.com/playlist/3wG8xjrf5opSS6ONz8yCv4?si=zHUOKzBqTPO4E-QUegF-Tg";
                    else document.getElementById(id).value = v[id] || "";
                }
            });
        });
    }

    function salvaDato(el) { db.ref("dailyData/" + curKey + "/" + el.id).set(el.value); statusUpdate(); }
    function salvaCheckV3(el) { db.ref("dailyData/" + curKey + "/" + el.id).set(el.checked); statusUpdate(); }
    function statusUpdate() { document.getElementById('sync-status').innerText = "☁️..."; setTimeout(()=>document.getElementById('sync-status').innerText="✅ SINCRO", 600); }
    function chiudi() { document.getElementById('modal').style.display = 'none'; }
    function cambiaSett(n) { dataInizio.setDate(dataInizio.getDate()+n); renderCalendar(); }
    function openTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }
    window.onload = renderCalendar;
</script>
</body>
</html>
